        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}
function selM(id){selMember=selMember===id?null:id;rML();rCL();}
function dropC(cid){if(!dragMid)return;mkLink(dragMid,cid);dragMid=null;}
function togC(cid){if(!selMember)return;const ex=S.links.find(l=>l.memberId===selMember&&l.clientId===cid);if(ex)rmLink(ex.id,true);else mkLink(selMember,cid);}
function mkLink(mid,cid){if(S.links.some(l=>l.memberId===mid&&l.clientId===cid))return;S.links.push({id:uid(),memberId:mid,clientId:cid,roles:[]});save();rBL();}
function rmLink(lid,silent){if(!silent&&!confirm('Remove assignment and all its roles?'))return;S.links=S.links.filter(l=>l.id!==lid);save();rCanvas();rML();rCL();}
function rmRole(lid,rid){const l=S.links.find(l=>l.id===lid);if(l)l.roles=l.roles.filter(r=>r.id!==rid);save();rCanvas();}

          <th onclick="lvSortBy('name')" class="${lvSort.col==='name'?'sort-'+lvSort.dir:''}">Task name</th>
          <th onclick="lvSortBy('mood')" class="${lvSort.col==='mood'?'sort-'+lvSort.dir:''}">Mood</th>
          <th onclick="lvSortBy('status')" class="${lvSort.col==='status'?'sort-'+lvSort.dir:''}">Status</th>
          <th onclick="lvSortBy('client')" class="${lvSort.col==='client'?'sort-'+lvSort.dir:''}">Client</th>
          <th onclick="lvSortBy('assignee')" class="${lvSort.col==='assignee'?'sort-'+lvSort.dir:''}">Assigned to</th>
          <th onclick="lvSortBy('time')" class="${lvSort.col==='time'?'sort-'+lvSort.dir:''}">Est. time</th>
          <th>Tags</th>
          <th>Milestone</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${getLVTasks().map(t=>rLVRow(t)).join('')}</tbody>
    </table>
  </div>`;
}

function getLVTasks(){
  let tasks=S.tasks.filter(t=>!t.deleted);
  if(lvFilters.hideCompleted) tasks=tasks.filter(t=>t.status!=='Complete');
  if(lvFilters.member) tasks=tasks.filter(t=>t.assignedTo&&t.assignedTo.includes(lvFilters.member));
  if(lvFilters.client) tasks=tasks.filter(t=>t.clientId===lvFilters.client);
  if(lvFilters.mood) tasks=tasks.filter(t=>t.mood===lvFilters.mood);
  if(lvFilters.status) tasks=tasks.filter(t=>t.status===lvFilters.status);
  if(lvFilters.tag) tasks=tasks.filter(t=>t.tags&&t.tags.includes(lvFilters.tag));
  // sort
  tasks.sort((a,b)=>{
    let av,bv;
    if(lvSort.col==='date'){av=a.date||'';bv=b.date||'';}
    else if(lvSort.col==='name'){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
    else if(lvSort.col==='mood'){av=MOOD_ORDER.indexOf(a.mood);bv=MOOD_ORDER.indexOf(b.mood);}
    else if(lvSort.col==='status'){av=STATS.indexOf(a.status);bv=STATS.indexOf(b.status);}
    else if(lvSort.col==='client'){const ca=gc(a.clientId),cb=gc(b.clientId);av=(ca?ca.name:'');bv=(cb?cb.name:'');}
    else if(lvSort.col==='assignee'){const ma=gm(a.assignedTo&&a.assignedTo[0]),mb=gm(b.assignedTo&&b.assignedTo[0]);av=(ma?ma.name:'');bv=(mb?mb.name:'');}
    else if(lvSort.col==='time'){av=(a.estH||0)*60+(a.estM||0);bv=(b.estH||0)*60+(b.estM||0);}
    else{av='';bv='';}
    if(av<bv)return lvSort.dir==='asc'?-1:1;
    if(av>bv)return lvSort.dir==='asc'?1:-1;
    return 0;
  });
  return tasks;
}

function lvSortBy(col){
  if(lvSort.col===col)lvSort.dir=lvSort.dir==='asc'?'desc':'asc';
  else{lvSort.col=col;lvSort.dir=col==='date'?'desc':'asc';}
  rLV();
}

function rLVRow(t){
  const mood=gmood(t.mood);
  const client=gc(t.clientId);
  const assignees=(t.assignedTo||[]).map(id=>{const m=gm(id);return m?m.name:''}).filter(Boolean);
  const taskTags=(t.tags||[]).map(tid=>{const tg=gtag(tid);return tg?tg.label:''}).filter(Boolean);
  const ms=t.milestoneId?S.milestones.find(m=>m.id===t.milestoneId):null;
  const timeStr=taskTimeStr(t);
  return `<tr onclick="openTaskDetail('${t.id}')">

function tg2ReorderProj(targetId){
  if(!tg2DragId||tg2DragId===targetId)return;
  const cl=scl();
  const di=cl.findIndex(c=>c.id===tg2DragId);
  const ti=cl.findIndex(c=>c.id===targetId);
  const [dr]=cl.splice(di,1);cl.splice(ti,0,dr);
  cl.forEach((c,i)=>{const sc=S.clients.find(x=>x.id===c.id);if(sc)sc.order=i;});
  save();rTG2();
}

function rTG2ProjectDetail(proj){
  const freqTags=(S.freqTags||[]).sort((a,b)=>(a.order||0)-(b.order||0));
  const allTemplates=(S.templates||[]).filter(t=>t.clientId===proj.id);
  // sort preference stored per project
  const sortKey=`tg2sort_${proj.id}`;
  const sortMode=window[sortKey]||'freq'; // 'freq' or 'name'

  let templates=[...allTemplates];
  if(sortMode==='freq'){
    const freqOrder=freqTags.map(f=>f.id);
    templates.sort((a,b)=>{
      const ai=freqOrder.indexOf(a.freqId);
      const bi=freqOrder.indexOf(b.freqId);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  } else {
    templates.sort((a,b)=>a.name.localeCompare(b.name));
  }

  const freqBtns=freqTags.map(f=>`<span class="freq-tag" onclick="openTG2TemplateModal('${proj.id}','${f.id}')">${f.label}</span>`).join('');
  const tmplCards=templates.map(t=>rTG2TemplateCard(t,proj)).join('');

  return `<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div style="width:12px;height:12px;border-radius:50%;background:${proj.color}"></div>
      <span style="font-size:18px;font-weight:800;letter-spacing:-.4px">${proj.name}</span>
      <span style="font-size:12px;color:var(--t3)">${proj.industry}</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--t3)">Sort:</span>
        <button class="btn btn-xs${sortMode==='freq'?' btn-p':''}" onclick="window['${sortKey}']='freq';document.getElementById('tg2-right').innerHTML=rTG2ProjectDetail(scl().find(c=>c.id==='${proj.id}'))">By frequency</button>
        <button class="btn btn-xs${sortMode==='name'?' btn-p':''}" onclick="window['${sortKey}']='name';document.getElementById('tg2-right').innerHTML=rTG2ProjectDetail(scl().find(c=>c.id==='${proj.id}'))">A–Z</button>
      </div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Add template by frequency</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">${freqBtns}</div>
    ${templates.length?`<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Templates (${templates.length})</div>${tmplCards}`:'<div style="font-size:13px;color:var(--t3);padding:20px 0;text-align:center;border:1.5px dashed var(--border);border-radius:var(--r)">No templates yet &mdash; click a frequency tag above to create one</div>'}
  </div>`;
}

function saveTG2Template(existId){
  const name=document.getElementById('tg2n').value.trim();
  if(!name){const el=document.getElementById('tg2n');if(el){el.classList.add('req');el.focus();}return;}
  // collect selected freq tags from checkboxes
  const freqChecked=[];
  document.querySelectorAll('.tg2-freq-cb:checked').forEach(cb=>freqChecked.push(cb.value));
  // fallback to single freqId hidden field
  const singleFreq=document.getElementById('tg2fid')?.value;
  const finalFreqs=freqChecked.length?freqChecked:(singleFreq?[singleFreq]:[]);
  const tmpl={
    name,
    clientId:document.getElementById('tg2cid').value,
    freqIds:finalFreqs,
    freqId:finalFreqs[0]||'',  // keep for backward compat
    mood:_mood||'rapid',
    assignedTo:[..._assigned],
    estH:parseInt(document.getElementById('tg2eh')?.value)||0,
    estM:parseInt(document.getElementById('tg2em')?.value)||0,
    notes:document.getElementById('tg2notes').value.trim(),
    updatedAt:Date.now()
  };
  if(!S.templates)S.templates=[];
  if(existId){const t=S.templates.find(t=>t.id===existId);if(t)Object.assign(t,tmpl);}
  else S.templates.push({id:uid(),...tmpl,createdAt:Date.now()});
  save();closeModal();rTG2();
}

function delTG2Template(id){
  if(!S.templates)return;
  S.templates=S.templates.filter(t=>t.id!==id);
  save();rTG2();
}

function createTaskFromTemplate(tmplId){
  const tmpl=(S.templates||[]).find(t=>t.id===tmplId);
  if(!tmpl)return;
  const dateEl=document.getElementById('tcdate-'+tmplId);
  const taskDate=dateEl?dateEl.value:dashDate||today();
  if(!S.tasks)S.tasks=[];
  const newTask={
    id:uid(),
    name:tmpl.name,
    clientId:tmpl.clientId,
    date:taskDate,
    mood:tmpl.mood||'rapid',
    status:'Not Started',
    assignedTo:tmpl.assignedTo?[...tmpl.assignedTo]:[],
    tags:[],
    estH:tmpl.estH||0,estM:tmpl.estM||0,
    notes:tmpl.notes||'',
    isMilestone:false,milestoneId:null,
    createdAt:Date.now(),updatedAt:Date.now(),
    fromTemplate:tmplId
  };
  S.tasks.push(newTask);
  save();
  // Show inline confirmation with "Open task" option
  const cardEl=document.querySelector(`[onclick="createTaskFromTemplate('${tmplId}')"]`)?.closest('.tmpl-card');
  const btn=document.querySelector(`[onclick="createTaskFromTemplate('${tmplId}')"]`);
  if(btn){btn.innerHTML='&#10003; Created!';btn.style.background='var(--accent)';btn.disabled=true;}
  if(cardEl){
    const old=cardEl.querySelector('.tg2-confirm');if(old)old.remove();
    const conf=document.createElement('div');
    conf.className='tg2-confirm';
    conf.style.cssText='display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px 10px;background:var(--al);border-radius:var(--r);border:1px solid var(--accent)44;font-size:12px';
    conf.innerHTML=`<span style="color:var(--accent);font-weight:700">&#10003; Task added to dashboard</span>
      <button class="btn btn-sm btn-p" style="margin-left:auto" onclick="openTaskDetail('${newTask.id}');this.closest('.tg2-confirm').remove()">Open task &#8599;</button>
      <button class="btn btn-xs btn-g" onclick="this.closest('.tg2-confirm').remove()">&#10005;</button>`;
    cardEl.appendChild(conf);
    setTimeout(()=>{if(btn){btn.innerHTML='&#9889; Create task';btn.style.background='';btn.disabled=false;}},3000);
  }
}

let tg2AllSort='freq', tg2AllFilterFreq='', tg2AllFilterClient='', tg2AllFilterMember='';

function rTG2All(el){
  const freqTags=(S.freqTags||[]).sort((a,b)=>(a.order||0)-(b.order||0));

  // apply multi filters
  let templates=[...(S.templates||[])];
  if(tg2AllMulti.freqs.length)    templates=templates.filter(t=>(t.freqIds||[t.freqId]).some(f=>tg2AllMulti.freqs.includes(f)));
  if(tg2AllMulti.clients.length)  templates=templates.filter(t=>tg2AllMulti.clients.includes(t.clientId));
  if(tg2AllMulti.members.length)  templates=templates.filter(t=>(t.assignedTo||[]).some(m=>tg2AllMulti.members.includes(m)));
  if(tg2AllMulti.moods.length)    templates=templates.filter(t=>tg2AllMulti.moods.includes(t.mood));

  // sort
  if(tg2AllSort==='freq'){
    const fo=freqTags.map(f=>f.id);

      <span style="font-size:11px;color:var(--t2);white-space:nowrap">${done}/${lt.length} tasks${timeDisp?' &middot; '+timeDisp:''}</span>
    </div>
    ${next?`<div style="font-size:12px;color:var(--t2);padding:6px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px"><span style="font-size:10px;font-weight:700;color:var(--t3)">Next &rarr; </span>${next.name}</div>`:''}

    ${isLinked?`<div style="display:flex;gap:8px">
      <button class="btn btn-xs btn-p" onclick="openTaskForMS('${ms.id}')">+ Add task</button>
      <button class="btn btn-xs" onclick="openEditMS('${ms.id}')">Edit milestone</button>
    </div>`:''}
  </div>`;
}

function tg2ToggleMSLink(msId, projId){
  const ms=S.milestones.find(m=>m.id===msId);

  if(!ms.linkedClients)ms.linkedClients=[];

  else ms.linkedClients.push(projId);
  save();rTG2();
}

let ftDragId=null;

function addFreqTag(){
  const inp=document.getElementById('newfreq');if(!inp)return;
  const label=inp.value.trim();if(!label)return;
  if(!S.freqTags)S.freqTags=[];
  if(S.freqTags.find(f=>f.label.toLowerCase()===label.toLowerCase())){inp.value='';return;}
  S.freqTags.push({id:uid(),label,order:S.freqTags.length});
  inp.value='';save();rST();
}

function openEditFreqTag(id){
  const f=(S.freqTags||[]).find(f=>f.id===id);if(!f)return;
  openModal(`<div class="modal"><h2>Edit frequency tag</h2>
    <label class="fl">Label</label><input id="ftl" type="text" value="${f.label}">
    <div class="ma"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveFreqTag('${id}')">Save</button></div>
  </div>`);
  setTimeout(()=>{const el=document.getElementById('ftl');if(el)el.focus();},60);
}

function saveFreqTag(id){
  const f=(S.freqTags||[]).find(f=>f.id===id);
  if(f){f.label=document.getElementById('ftl').value.trim()||f.label;}
  save();closeModal();rST();
}

function delFreqTag(id){
  if(!confirm('Remove this frequency tag? Templates using it will keep their reference.'))return;
  S.freqTags=(S.freqTags||[]).filter(f=>f.id!==id);
  save();rST();
}

function ftReorder(targetId){
  if(!ftDragId||ftDragId===targetId)return;
  const fl=(S.freqTags||[]).sort((a,b)=>(a.order||0)-(b.order||0));
  const di=fl.findIndex(f=>f.id===ftDragId);
  const ti=fl.findIndex(f=>f.id===targetId);
  const [dr]=fl.splice(di,1);fl.splice(ti,0,dr);
  fl.forEach((f,i)=>{const sf=S.freqTags.find(x=>x.id===f.id);if(sf)sf.order=i;});
  save();
}

function luCardSize(moodId){
  const mood=gmood(moodId);
  if(mood&&mood.cardSize) return mood.cardSize;
  // fallback heuristic
  const lbl=(mood?.label||'').toLowerCase();
  if(lbl.includes('hero')||lbl.includes('imp')) return 'big';
  if(lbl.includes('creative')||lbl.includes('second')) return 'mid';
  return 'narrow';
}

function shiftLUDate(days){
  const d=new Date(dashDate+'T12:00:00');
  d.setDate(d.getDate()+days);
  dashDate=d.toISOString().slice(0,10);
  rLU();
}

function getLUTasks(){
  let tasks=tasksOnDate(dashDate).filter(t=>t.status!=='Complete');
  const hidden=S.lineUpHidden[dashDate]||[];
  tasks=tasks.filter(t=>!hidden.includes(t.id));

  if(luFilterMember) tasks=tasks.filter(t=>t.assignedTo&&t.assignedTo.includes(luFilterMember));
  if(luFilterClient) tasks=tasks.filter(t=>t.clientId===luFilterClient);
  if(luFilterMood) tasks=tasks.filter(t=>t.mood===luFilterMood);

  // apply saved order first
  const order=S.lineUpOrder[dashDate]||[];
  const ordered=[];
  const remaining=[...tasks];
  order.forEach(id=>{
    const idx=remaining.findIndex(t=>t.id===id);
    if(idx!==-1) ordered.push(remaining.splice(idx,1)[0]);
  });
  // remaining tasks not in saved order - sort by chosen mode
  if(luSortMode==='mood'){
    const mo=S.moods.map(m=>m.id);
    remaining.sort((a,b)=>mo.indexOf(a.mood)-mo.indexOf(b.mood));
  } else if(luSortMode==='team'){
    remaining.sort((a,b)=>{
      const ma=gm(a.assignedTo&&a.assignedTo[0]),mb=gm(b.assignedTo&&b.assignedTo[0]);
      return (ma?ma.name:'').localeCompare(mb?mb.name:'');
    });
  } else if(luSortMode==='client'){
    remaining.sort((a,b)=>{
      const ca=gc(a.clientId),cb=gc(b.clientId);
      return (ca?ca.name:'').localeCompare(cb?cb.name:'');
    });
  }
  return [...ordered, ...remaining];
}

function rLUMain(){
  const el=document.getElementById('lu-main');
  if(!el)return;
  const tasks=getLUTasks();
  if(!tasks.length){
    el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:var(--t3)"><div style="font-size:36px">&#128203;</div><p style="font-size:13px;font-weight:600;color:var(--t2)">No tasks for ${fmtD(dashDate)}</p></div>`;
    return;
  }
  el.innerHTML=tasks.map(t=>rLUCard(t)).join('');
}

function rLUCard(task){
  const mood=gmood(task.mood);
  const client=gc(task.clientId);
  const size=luCardSize(task.mood);
  const assignees=(task.assignedTo||[]).map(id=>gm(id)).filter(Boolean);
  const timeStr=taskTimeStr(task);
  const moodColor=mood?mood.color:'#888';
  const moodBg=mood?mood.bg:'#f2f0ec';
  const isNarrow=size==='narrow';
  const isBig=size==='big';

  const moodChipInner=`<span style="font-size:${isBig?'26px':isNarrow?'14px':'20px'}">${mood?mood.icon:'?'}</span>
    ${!isNarrow?`<span class="lu-mood-name" style="color:${moodColor}">${mood?mood.label:''}</span>`:''}`;

  // meta chips
  const clientChip=client?`<span class="lu-meta-chip" style="background:${client.color}15;color:${client.color}">${client.name}</span>`:'';
  const memberChips=assignees.map(m=>`<span class="lu-meta-chip" style="background:${m.color}12;color:${m.color}">${m.name}</span>`).join('');
  const statusSel=`<select class="lu-status-sel" style="background:${STB[task.status]};color:${STC[task.status]};border-color:${STC[task.status]}33" onclick="event.stopPropagation()" onchange="event.stopPropagation();luSetStatus('${task.id}',this.value)">${STATS.map(s=>`<option value="${s}" ${task.status===s?'selected':''}>${s}</option>`).join('')}</select>`;
  const timeChip=timeStr?`<span class="lu-time-chip">${timeStr}</span>`:'';

  const actions=`<div class="lu-actions" onclick="event.stopPropagation()">
    ${!isNarrow?`<button class="lu-open-btn" onclick="openTaskDetail('${task.id}')">Open</button>`:''}
    <button class="lu-hide-btn" onclick="luHideTask('${task.id}')" title="Hide">&#10005;</button>
  </div>`;

  return `<div class="lu-card size-${size}" id="lucard-${task.id}" draggable="true"
    ondragstart="luDragStart(event,'${task.id}')"
    ondragend="luDragEnd(event)"
    ondragover="luDragOver(event,'${task.id}')"
    ondragleave="luDragLeave(event)"
    ondrop="luDrop(event,'${task.id}')"
    onclick="openTaskDetail('${task.id}')">
    <div class="lu-mood-bar" style="background:${moodColor}"></div>
    <span class="lu-drag-handle" onclick="event.stopPropagation()">&#8942;</span>
    <div class="lu-mood-chip" style="background:${moodBg}">${moodChipInner}</div>
    <div class="lu-info">
      <div class="lu-title">${task.isMilestone?'&#127937; ':''}${task.name}</div>
      ${!isNarrow?`<div class="lu-meta-row">${clientChip}${memberChips}${statusSel}${timeChip}</div>`:''}
      ${isBig&&task.notes?`<div style="font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;opacity:.7">${task.notes}</div>`:''}
    </div>
    ${actions}
  </div>`;
}

function rLUHidden(){
  const el=document.getElementById('lu-hidden-body');
  const cntEl=document.getElementById('lu-hidden-count');
  if(!el)return;
  const hiddenIds=S.lineUpHidden[dashDate]||[];
  const hiddenTasks=hiddenIds.map(id=>S.tasks.find(t=>t.id===id&&!t.deleted)).filter(Boolean);
  if(cntEl)cntEl.textContent=hiddenTasks.length;
  if(!hiddenTasks.length){
    el.innerHTML=`<div style="font-size:12px;color:var(--t3);padding:12px 6px;text-align:center">No hidden tasks</div>`;
    return;
  }
  el.innerHTML=hiddenTasks.map(t=>{
    const mood=gmood(t.mood);
    return `<div class="lu-hidden-card">
      <span style="font-size:13px">${mood.icon}</span>
      <span class="lu-title" style="flex:1">${t.name}</span>
      <button class="lu-restore-btn" onclick="luRestoreTask('${t.id}')" title="Bring back to line up">&#8630;</button>
    </div>`;
  }).join('');
}

function luSetStatus(taskId,status){
  const t=S.tasks.find(t=>t.id===taskId);
  if(!t)return;
  t.status=status;
  save();
  if(status==='Complete'){
    rLUMain();
  } else {
    // update just this card's select colours without full rerender
    rLUMain();
  }
}

function luHideTask(taskId){
  if(!S.lineUpHidden[dashDate])S.lineUpHidden[dashDate]=[];
  if(!S.lineUpHidden[dashDate].includes(taskId)) S.lineUpHidden[dashDate].push(taskId);
  // remove from order too
  if(S.lineUpOrder[dashDate]) S.lineUpOrder[dashDate]=S.lineUpOrder[dashDate].filter(id=>id!==taskId);
  save();rLUMain();rLUHidden();
}

function luRestoreTask(taskId){
  if(S.lineUpHidden[dashDate]) S.lineUpHidden[dashDate]=S.lineUpHidden[dashDate].filter(id=>id!==taskId);
  save();rLUMain();rLUHidden();
}

// ── Drag reorder ────────────────────────────────────────────────────────
function luDragStart(e,taskId){
  luDragId=taskId;
  e.target.closest('.lu-card').classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function luDragEnd(e){
  document.querySelectorAll('.lu-card').forEach(c=>c.classList.remove('dragging','drag-over-top','drag-over-bottom'));
  luDragId=null;
}
function luDragOver(e,taskId){
  e.preventDefault();
  if(luDragId===taskId)return;
  const card=e.target.closest('.lu-card');
  if(!card)return;
  const rect=card.getBoundingClientRect();
  const midpoint=rect.top+rect.height/2;
  document.querySelectorAll('.lu-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));
  if(e.clientY<midpoint) card.classList.add('drag-over-top');
  else card.classList.add('drag-over-bottom');
}
function luDragLeave(e){
  const card=e.target.closest('.lu-card');
  if(card) card.classList.remove('drag-over-top','drag-over-bottom');
}
function luDrop(e,targetId){
  e.preventDefault();
  if(!luDragId||luDragId===targetId){document.querySelectorAll('.lu-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom','dragging'));return;}

  const card=e.target.closest('.lu-card');
  const rect=card.getBoundingClientRect();
  const midpoint=rect.top+rect.height/2;
  const insertAfter=e.clientY>=midpoint;

  // build current order array from visible tasks
  const tasks=getLUTasks();
  let ids=tasks.map(t=>t.id);
  const fromIdx=ids.indexOf(luDragId);
  ids.splice(fromIdx,1);
  let toIdx=ids.indexOf(targetId);
  if(insertAfter) toIdx+=1;
  ids.splice(toIdx,0,luDragId);

  S.lineUpOrder[dashDate]=ids;
  save();
  document.querySelectorAll('.lu-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom','dragging'));
  rLUMain();
}

// ── Resizer ─────────────────────────────────────────────────────────────
function initLUResizer(){
  const resizer=document.getElementById('lu-resizer');
  const panel=document.querySelector('.lu-hidden-panel');
  if(!resizer||!panel)return;
  let dragging=false;
  resizer.addEventListener('mousedown',e=>{
    dragging=true;
    document.body.style.cursor='col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const container=panel.parentElement;
    const containerRect=container.getBoundingClientRect();
    let newWidth=containerRect.right-e.clientX;
    newWidth=Math.max(160,Math.min(450,newWidth));
    luPanelWidth=newWidth;
    panel.style.width=newWidth+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;document.body.style.cursor='';}
  });
}


// ── Settings drag + helpers ─────────────────────────────────────────────
const stDrag={id:null,type:null};

function stReorder(type,targetId){
  if(!stDrag.id||stDrag.id===targetId||stDrag.type!==type)return;
  if(type==='member'){
    const arr=S.members;
    const fi=arr.findIndex(x=>x.id===stDrag.id);
    const ti=arr.findIndex(x=>x.id===targetId);
    const [dr]=arr.splice(fi,1);arr.splice(ti,0,dr);
  } else if(type==='client'){
    const cl=scl();
    const fi=cl.findIndex(x=>x.id===stDrag.id);
    const ti=cl.findIndex(x=>x.id===targetId);
    const [dr]=cl.splice(fi,1);cl.splice(ti,0,dr);
    cl.forEach((c,i)=>{const sc=S.clients.find(x=>x.id===c.id);if(sc)sc.order=i;});
  } else if(type==='mood'){
    const arr=S.moods;
    const fi=arr.findIndex(x=>x.id===stDrag.id);
    const ti=arr.findIndex(x=>x.id===targetId);
    const [dr]=arr.splice(fi,1);arr.splice(ti,0,dr);
  } else if(type==='tag'){
    const arr=S.tags;
    const fi=arr.findIndex(x=>x.id===stDrag.id);
    const ti=arr.findIndex(x=>x.id===targetId);
    const [dr]=arr.splice(fi,1);arr.splice(ti,0,dr);
  }
  stDrag.id=null;stDrag.type=null;
  save();rST();
}

function toggleMoodHidden(moodId){
  const m=S.moods.find(x=>x.id===moodId);
  if(m) m.hidden=!m.hidden;
  save();rST();
}

let pgTabs=null, pgActiveTab=0;
const PG_ROWS=20, PG_COLS=10;

function pgInit(){

  if(!S.playground)S.playground={tabs:[{id:uid(),name:'Sheet 1',data:{}}]};

let pgSidebarOpen=true;

    </div>

function pgInsertClient(cid){
  const c=gc(cid);if(!c)return;
  // find focused cell and insert client name
  const focused=document.activeElement;
  if(focused&&focused.classList.contains('pg-cell')){
    const start=focused.selectionStart;
    const val=focused.value;
    focused.value=val.slice(0,start)+c.name+val.slice(focused.selectionEnd);
    focused.selectionStart=focused.selectionEnd=start+c.name.length;
    focused.dispatchEvent(new Event('input'));
  }
}

function renderPGTable(tab){
  const data=tab.data||{};
  let html=`<table class="pg-table"><colgroup>${Array(PG_COLS).fill('<col>').join('')}</colgroup><tbody>`;
  for(let r=0;r<PG_ROWS;r++){
    html+=`<tr>`;
    for(let c=0;c<PG_COLS;c++){
      const key=`${r},${c}`;
      const cell=data[key]||{text:'',taskId:null};
      const hasTask=!!(cell.taskId&&S.tasks.find(t=>t.id===cell.taskId&&!t.deleted));
      html+=`<td>
        <textarea class="pg-cell${hasTask?' has-task':''}" rows="1"
          onkeydown="pgCellKey(event,${r},${c})"
          oninput="pgCellInput(event,${r},${c})"
          onfocus="pgCellFocus(event,${r},${c})"
          onclick="if(this.dataset.taskid)openTaskDetail(this.dataset.taskid)"
          data-taskid="${cell.taskId||''}"
          placeholder=" ">${pgEsc(cell.text)}</textarea>
        <div class="pg-cell-actions">
          ${hasTask?`<button class="pg-cell-btn task-done" onclick="openTaskDetail('${cell.taskId}')" title="Open task">&#128196;</button>`:`<button class="pg-cell-btn" onclick="pgConvertToTask(${r},${c})" title="Convert to task">&#10133;</button>`}
        </div>
      </td>`;
    }
    html+=`</tr>`;
  }
  html+=`</tbody></table>`;
  return html;
}

function pgEsc(t){return (t||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function pgCellInput(e,r,c){
  const tab=pgTabs[pgActiveTab];if(!tab)return;
  if(!tab.data)tab.data={};
  const key=`${r},${c}`;
  if(!tab.data[key])tab.data[key]={text:'',taskId:null};
  tab.data[key].text=e.target.value;
  // auto-resize
  e.target.style.height='auto';
  e.target.style.height=e.target.scrollHeight+'px';
  // debounce save
  clearTimeout(tab._st);
  tab._st=setTimeout(()=>{S.playground={tabs:pgTabs};save();},600);
}

function pgCellFocus(e,r,c){
  e.target.style.height='auto';
  e.target.style.height=e.target.scrollHeight+'px';
}

function pgCellKey(e,r,c){
  const cells=document.querySelectorAll('.pg-cell');
  const idx=r*PG_COLS+c;
  if(e.key==='Tab'){
    e.preventDefault();
    const next=cells[idx+1];if(next)next.focus();
  } else if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const next=cells[idx+PG_COLS];if(next)next.focus();
  } else if(e.key==='ArrowDown'&&!e.shiftKey){
    // only move if caret is at end of text or cell is single line
    const ta=e.target;
    if(ta.selectionStart===ta.value.length||!ta.value.includes('\n')){
      e.preventDefault();
      const next=cells[idx+PG_COLS];if(next)next.focus();
    }
  } else if(e.key==='ArrowUp'&&!e.shiftKey){
    const ta=e.target;
    if(ta.selectionStart===0||!ta.value.includes('\n')){
      e.preventDefault();
      const prev=cells[idx-PG_COLS];if(prev)prev.focus();
    }
  } else if(e.key==='ArrowRight'&&!e.shiftKey){
    const ta=e.target;
    if(ta.selectionStart===ta.value.length){
      e.preventDefault();
      const next=cells[idx+1];if(next)next.focus();
    }
  } else if(e.key==='ArrowLeft'&&!e.shiftKey){
    const ta=e.target;
    if(ta.selectionStart===0){
      e.preventDefault();
      const prev=cells[idx-1];if(prev)prev.focus();
    }
  }
}

function pgConvertToTask(r,c){
  const tab=pgTabs[pgActiveTab];if(!tab)return;
  const key=`${r},${c}`;
  const cell=tab.data?tab.data[key]:null;
  const text=(cell?.text||'').trim();

  // open task modal pre-filled with cell text

  const moodBtns=S.moods.map(m=>{
    const on=_mood===m.id;
    return `<div class="mood-opt-btn${on?' on':''}" style="${on?'background:'+m.bg+';color:'+m.color+';border-color:'+m.color+';border-width:2px':''}" onclick="pickTMood('${m.id}',this)">${m.icon} ${m.label}</div>`;
  }).join('');
  const statOpts=STATS.map(s=>`<option value="${s}" ${'Not Started'===s?'selected':''}>${s}</option>`).join('');
  const teamBtns=S.members.map(m=>`<div class="ttagopt" onclick="togTAssign('${m.id}',this)">${avEl(m.name,m.color,16)} ${m.name}</div>`).join('');
  const clientOpts=`<option value="">— None —</option>`+scl().map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

  openModal(`<div class="modal modal-lg">
    <h2>Convert cell to task</h2>
    <div style="padding:8px 12px;background:var(--al);border-radius:var(--r);border:1px solid var(--accent)33;font-size:13px;color:var(--accent);font-weight:600;margin-bottom:14px">&#128196; "${pgEsc(text.slice(0,60))}${text.length>60?'…':''}"</div>
    <label class="fl" style="margin-top:0">Task name *</label>
    <input id="tn" type="text" value="${text.replace(/"/g,'&quot;')}" oninput="clearReq('tn')">
    <label class="fl">Mood</label>
    <div class="mood-pick-row" id="mprow">${moodBtns}</div>
    <label class="fl">Assign to</label>
    <div class="ttag-row" id="tarow">${teamBtns}</div>
    <label class="fl">Client</label>
    <select id="tc" style="margin-top:6px">${clientOpts}</select>
    <label class="fl">Date</label>
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
      <input type="date" id="td2" value="${date}" style="width:150px;font-size:13px">
      <button class="btn btn-xs" onclick="document.getElementById('td2').value=today()">Today</button>
    </div>
    <label class="fl">Status</label>
    <select id="tst" style="width:180px;margin-top:6px">${statOpts}</select>
    <div style="display:flex;gap:12px;align-items:flex-start;margin-top:14px">
      <div style="flex:0 0 160px">
        <label class="fl" style="margin-top:0">Est. time</label>
        <div style="display:flex;gap:6px;align-items:center;margin-top:6px">
          <input id="teh" type="number" placeholder="0" min="0" max="99" value="" style="width:58px"> <span style="font-size:12px;color:var(--t2)">h</span>
          <input id="tem" type="number" placeholder="0" min="0" max="59" value="" style="width:58px"> <span style="font-size:12px;color:var(--t2)">m</span>
        </div>
      </div>
      <div style="flex:1">
        <label class="fl" style="margin-top:0">Notes</label>
        <textarea id="tnotes" placeholder="Notes&hellip;" style="min-height:52px;margin-top:6px"></textarea>
      </div>
    </div>
    <input type="hidden" id="pg-conv-r" value="${r}">
    <input type="hidden" id="pg-conv-c" value="${c}">
    <div class="ma">
      <button class="btn btn-g" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="pgSaveConvertedTask()">Create task &amp; link cell</button>
    </div>
  </div>`);
  setTimeout(()=>{const f=document.getElementById('tn');if(f)f.focus();},60);
}

function pgSaveConvertedTask(){
  const name=document.getElementById('tn').value.trim();
  if(!name){document.getElementById('tn').classList.add('req');return;}
  if(!_assigned.length){document.querySelectorAll('#tarow .ttagopt').forEach(e=>e.style.outline='2px solid var(--warn)');return;}

  const statusEl=document.getElementById('tst');
  const newTask={
    id:uid(),name,
    clientId:document.getElementById('tc').value||null,
    date:document.getElementById('td2').value||today(),
    mood:_mood||'rapid',
    status:statusEl?statusEl.value:'Not Started',
    assignedTo:[..._assigned],tags:[],
    estH:parseInt(document.getElementById('teh').value)||0,
    estM:parseInt(document.getElementById('tem').value)||0,
    notes:document.getElementById('tnotes').value.trim(),
    isMilestone:false,milestoneId:null,
    createdAt:Date.now(),updatedAt:Date.now()
  };
  S.tasks.push(newTask);

  // link cell to task
  const r=parseInt(document.getElementById('pg-conv-r').value);
  const c=parseInt(document.getElementById('pg-conv-c').value);
  const tab=pgTabs[pgActiveTab];
  if(tab){
    if(!tab.data)tab.data={};
    const key=`${r},${c}`;
    if(!tab.data[key])tab.data[key]={text:name,taskId:null};
    tab.data[key].taskId=newTask.id;
    tab.data[key].text=name;
    S.playground={tabs:pgTabs};
  }
  save();closeModal();rPG();
}

function pgAddTab(){
  pgTabs.push({id:uid(),name:`Sheet ${pgTabs.length+1}`,data:{}});
  pgActiveTab=pgTabs.length-1;
  S.playground={tabs:pgTabs};save();rPG();
}

function pgDelTab(i){
  if(pgTabs.length===1){alert('Cannot delete the last sheet.');return;}
  if(!confirm('Delete this sheet?'))return;
  pgTabs.splice(i,1);
  pgActiveTab=Math.min(pgActiveTab,pgTabs.length-1);
  S.playground={tabs:pgTabs};save();rPG();
}

function pgRenameTab(i){
  const tab=pgTabs[i];if(!tab)return;
  openModal(`<div class="modal"><h2>Rename sheet</h2>
    <label class="fl">Sheet name</label>
    <input id="pg-tab-name" type="text" value="${tab.name}">
    <div class="ma"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="pgSaveRename(${i})">Rename</button></div>
  </div>`);
  setTimeout(()=>{const f=document.getElementById('pg-tab-name');if(f){f.focus();f.select();}},60);
}

function pgSaveRename(i){
  const v=document.getElementById('pg-tab-name').value.trim();
  if(v)pgTabs[i].name=v;
  S.playground={tabs:pgTabs};save();closeModal();rPG();
}

function pgClearTab(i){
  if(!confirm('Clear all content in this sheet?'))return;
  pgTabs[i].data={};
  S.playground={tabs:pgTabs};save();rPG();
}


// ── Dynamic nav ──────────────────────────────────────────────────────────
const NAV_ICONS={tkd:'&#128202;',tg2:'&#128161;',lu:'&#128203;',lv:'&#9783;',tk:'&#9776;',td:'&#9635;',bl:'&#9711;',pg:'&#9698;',st:'&#9881;'};
let _currentView='tkd';

function renderNav(){
  const container=document.getElementById('nav-tabs-container');
  if(!container)return;
  const order=S.navOrder||['tkd','tg2','lu','lv','tk','td','bl','pg','st'];
  const labels=S.navLabels||{};
  container.innerHTML=order.map(v=>`<div class="nt${_currentView===v?' active':''}" id="tab-${v}" onclick="sv('${v}')">${NAV_ICONS[v]||''} ${labels[v]||v}</div>`).join('');
}


// ── Nav reorder ──────────────────────────────────────────────────────────
let navDragId=null;

function stNavReorder(targetId){
  if(!navDragId||navDragId===targetId)return;
  const order=S.navOrder||[];
  const fi=order.indexOf(navDragId);
  const ti=order.indexOf(targetId);
  if(fi<0||ti<0)return;
  const [dr]=order.splice(fi,1);order.splice(ti,0,dr);
  navDragId=null;
  save();renderNav();rST();
}

function stNavRename(id,label){
  if(!S.navLabels)S.navLabels={};
  S.navLabels[id]=label.trim()||id;
  save();renderNav();
}

function stNavReset(){
  S.navOrder=['tkd','tg2','lu','lv','tk','td','bl','pg','st'];
  S.navLabels={tkd:'Task Dashboard',tg2:'Task Gen 2.0',lu:'Line Up',lv:'List View',tk:'Tasks & Milestones',td:'Team Dashboard',bl:'Builder',pg:'Playground',st:'Settings'};
  save();renderNav();rST();
}

// Boot
load();
renderNav();
rTaskDash();
</script>
</body>
</html>
