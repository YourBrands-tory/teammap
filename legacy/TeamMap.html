<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamMap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--s2:#f2f0ec;--s3:#eceae5;
  --border:#e5e2db;--b2:#d5d2cb;
  --text:#1a1916;--t2:#6b6860;--t3:#a09d97;
  --accent:#2d6a4f;--a2:#52b788;--al:#d8f3dc;
  --warn:#e76f51;--wl:#fde8e2;
  --info:#2196c4;--il:#e3f2fd;
  --purple:#7c3aed;--pl:#ede9fe;
  --amber:#d97706;--aml:#fef3c7;
  --red:#dc2626;--rl:#fee2e2;
  --r:10px;--rl2:16px;--rx:20px;
  font-family:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* nav */
.nav{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);padding:0 16px;height:50px;flex-shrink:0;gap:1px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.nav-brand{font-size:15px;font-weight:800;letter-spacing:-.6px;margin-right:16px;color:var(--accent)}
.nav-brand span{color:var(--t3);font-weight:400}
.nt{padding:0 12px;height:50px;display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t2);cursor:pointer;border-bottom:2.5px solid transparent;transition:.15s;white-space:nowrap;user-select:none}
.nt:hover{color:var(--text)}
.nt.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.ns{flex:1}
.sb{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px;transition:.3s}
.sd{width:6px;height:6px;border-radius:50%;background:var(--a2);flex-shrink:0}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}
/* shared */
.btn{padding:7px 15px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px;background:var(--surface)}
.btn:hover{background:var(--s2)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:#245c42}
.btn-g{background:none;color:var(--t2);border-color:transparent}
.btn-g:hover{background:var(--s2)}
.btn-d{background:var(--wl);color:var(--warn);border-color:transparent}
.btn-d:hover{background:#fbd5cd}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:7px}
.btn-xs{padding:2px 7px;font-size:11px;border-radius:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.stl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}
.cb{height:4px;border-radius:2px;background:var(--s2);overflow:hidden;margin-top:3px}
.cf{height:100%;border-radius:2px;transition:.4s}
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.3px}
.fl:first-child{margin-top:0}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--al)}
textarea{resize:vertical;min-height:60px;line-height:1.5}
.req{border-color:var(--warn)!important;box-shadow:0 0 0 3px var(--wl)!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:var(--rx);padding:26px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.modal h2{font-size:17px;font-weight:800;margin-bottom:18px;letter-spacing:-.4px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.modal-lg{width:580px}
/* team dash */
.dash{flex:1;padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sc .sl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.sc .sv{font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.sc .ss{font-size:11px;color:var(--t2);margin-top:5px}
.mwrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);overflow:hidden}
.mh{display:flex;background:var(--s2);border-bottom:1px solid var(--border)}
.mhc{padding:10px 12px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;flex:1;min-width:90px}
.mrow{display:flex;border-bottom:1px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:#fafaf8}
.mc{padding:10px 12px;flex:1;min-width:90px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;font-size:13px}
.mc.mem{font-weight:600;background:var(--s2);border-right:1px solid var(--border)}
.rchip{padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
/* builder */
.builder{flex:1;display:grid;grid-template-columns:220px 220px 1fr;overflow:hidden}
.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.ph{padding:14px 15px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.ph h3{font-size:13px;font-weight:700;margin-bottom:3px}
.ph p{font-size:11px;color:var(--t3);line-height:1.4}
.pb{flex:1;overflow-y:auto;padding:10px}
.addbtn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--r);background:none;color:var(--t3);font-size:12px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;font-family:inherit}
.addbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.mcard{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:grab;transition:.15s}
.mcard:hover{border-color:var(--a2);box-shadow:0 2px 8px rgba(0,0,0,.08);transform:translateY(-1px)}
.mcard.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--al);background:var(--surface)}
.ccrd{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.15s}
.ccrd:hover{border-color:var(--info);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ccrd.linked{border-color:var(--accent);background:var(--al)}
.ccrd.dt{border-color:var(--info);background:var(--il);border-style:dashed}
.canvas{flex:1;overflow:auto;background:#fafaf8}
.ci{padding:20px;min-height:100%;display:flex;flex-direction:column;gap:12px}
.lcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rl2);padding:16px;transition:.2s}
.lcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.cblock{border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.rrow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);margin-bottom:5px;flex-wrap:wrap}
.rname{font-weight:600;font-size:13px;flex:1;min-width:100px}
.rtag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.rmeta{font-size:11px;color:var(--t2);white-space:nowrap}
.rdays{display:flex;gap:3px}
.dd{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.dd.on{background:var(--accent);color:#fff}
.dd.off{background:var(--s2);color:var(--t3)}
/* settings */
.sw{flex:1;overflow-y:auto;padding:24px}
.si{max-width:680px;margin:0 auto}
.ss-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:18px;margin-bottom:14px}
.ss-sec h3{font-size:14px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.li:last-child{border-bottom:none}
.lia{margin-left:auto;display:flex;gap:6px}
.trow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.trow:last-child{border-bottom:none}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
/* task dash - main layout */
.task-dash{flex:1;display:flex;overflow:hidden}
.task-dash-main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tdhdr{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
/* team columns */
.tcols{flex:1;overflow-x:auto;overflow-y:hidden;display:flex}
.tcol{min-width:195px;flex:1;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.tcol:last-child{border-right:none}
.tcolh{padding:10px 10px 8px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s2)}
.tcolb{flex:1;overflow-y:auto;padding:6px 6px 8px 6px;display:flex;flex-direction:column;gap:3px}
/* mood sections - fixed structure */
.msec{display:flex;flex-direction:column;flex-shrink:0;margin-bottom:4px}
/* top: fixed compact strip */
.msec.top-sec{flex-shrink:0}
.msec.top-sec .msec-tasks{max-height:110px;overflow-y:auto}
/* hero: dominant, fixed large space */
.msec.hero-sec{flex-shrink:0;border-radius:10px;padding:6px;margin-bottom:6px}
.msec.hero-sec .msec-tasks{height:190px;overflow-y:auto}
/* imp: secondary prominent, fixed */
.msec.imp-sec{flex-shrink:0;border-radius:8px;padding:4px;margin-bottom:6px}
.msec.imp-sec .msec-tasks{height:140px;overflow-y:auto}
/* others: appear only when tasks exist, scrollable fixed height */
.msec.other-sec .msec-tasks{max-height:80px;overflow-y:auto}
.msec.su-sec .msec-tasks{max-height:90px;overflow-y:auto}
/* always show scrollbar inside mood task areas */
.msec-tasks::-webkit-scrollbar{width:3px}
.msec-tasks::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.msec-head{display:flex;align-items:center;gap:5px;padding:3px 4px;margin-bottom:4px;flex-shrink:0;border-radius:5px}
.msec-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
.msec-cnt{font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px}
/* task cards */
.tcard{border-radius:8px;padding:7px 9px;cursor:pointer;transition:.15s;border:1px solid var(--border);position:relative;background:#fff}
.tcard:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--b2)}
/* hero — main visual focus */
.tcard.hero{padding:11px 12px;border-radius:10px;border:none;box-shadow:0 2px 10px rgba(0,0,0,.1)}
/* imp — secondary focus */
.tcard.imp-card{border-radius:9px;border:none;background:#fafaf8}
/* top — urgent but compact */
.tcard.top{border-left:3px solid #dc2626;background:#fff}
/* other moods — light */
.tcard.light{background:#fafafa;border-color:#eeece8}
.tcn{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:3px;color:var(--text)}
.tcard.hero .tcn{font-size:13px;font-weight:700}
.tcard.imp-card .tcn{font-size:12.5px;font-weight:700}
.tcc{font-size:10px;margin-bottom:3px;color:var(--t2);font-weight:500}
.tcs-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px}
.tcs{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:1px 5px;border-radius:4px;display:inline-block;cursor:pointer;transition:.15s}
.tcs:hover{opacity:.8}
.ttime{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:var(--s2);color:var(--t2);margin-left:auto;border:1px solid var(--border)}
.ttag-chip{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--s2);font-weight:600;border:1px solid var(--border);color:var(--t2)}
.su-sec{background:var(--wl);border-radius:8px;padding:6px 8px}
.su-head{font-size:10px;font-weight:800;color:var(--warn);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:flex;align-items:center;gap:4px}
/* side panel */
.sp{width:210px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sph{padding:11px 13px;border-bottom:1px solid var(--border);flex-shrink:0}
.sph h4{font-size:12px;font-weight:800;margin-bottom:3px}
.spb{flex:1;overflow-y:auto;padding:10px}
.spsec{margin-bottom:12px}
.spst{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px}
.spt{padding:7px 9px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid var(--border);transition:.15s}
.spt:hover{border-color:var(--a2);transform:translateX(2px)}
.sptn{font-size:12px;font-weight:600;margin-bottom:2px}
.sptm{font-size:10px;color:var(--t3)}
/* task generator */
.task-app{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tnav{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--s2);padding:0 16px;height:40px;flex-shrink:0}
.tt{padding:0 13px;height:40px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;user-select:none;font-weight:500}
.tt:hover{color:var(--text)}
.tt.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tgen{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden}
.tgl{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.tgr{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.ctr{display:flex;align-items:center;border-bottom:1px solid var(--border);transition:.15s;background:var(--surface);cursor:grab}
.ctr:hover{background:#fafaf9}
.ctr.dov{background:var(--al);border-color:var(--accent)}
/* pickers */
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.csw{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:.15s}
.csw:hover{transform:scale(1.15)}
.daypick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.daytog{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--s2);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit;color:var(--t2)}
.daytog.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.mpick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mopt{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:.15s;font-family:inherit;background:var(--s2);color:var(--t2);font-weight:500}
.mopt:hover{border-color:var(--accent)}
.mopt.on{font-weight:700}
.mood-pick-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.mood-opt-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:.15s;font-family:inherit;background:var(--s2);display:flex;align-items:center;gap:5px}
.mood-opt-btn.on{font-weight:700;border-width:2px}
.stpick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.stopt{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:.15s;font-family:inherit;background:var(--s2);font-weight:500}
.stopt.on{font-weight:700}
.ttag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ttagopt{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:.15s;font-family:inherit;background:var(--s2);font-weight:500;display:flex;align-items:center;gap:5px}
.ttagopt.on{background:var(--al);border-color:var(--accent);color:var(--accent);font-weight:700}
/* tag chips in modal */
.tag-chip-pick{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tcp{padding:3px 10px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;font-family:inherit;background:var(--s2);transition:.15s}
.tcp.on{font-weight:700;background:var(--accent);color:#fff;border-color:var(--accent)}
/* milestone */
.lrow{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:4px;font-size:12px}
.lord{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* inline status picker popup */
.st-popup{position:absolute;top:100%;left:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:5px;box-shadow:0 8px 24px rgba(0,0,0,.15);display:none;flex-direction:column;gap:3px;min-width:130px}
.st-popup.open{display:flex}
.st-popopt{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;transition:.15s;white-space:nowrap}
.st-popopt:hover{background:var(--s2)}
/* time input row */
.time-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.time-row input{width:70px}

/* List / filter view */
.lv-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lv-toolbar{padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:8px;flex-wrap:nowrap;flex-shrink:0;overflow-x:auto}
.lv-toolbar::-webkit-scrollbar{height:3px}
.lv-toolbar::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.lv-table-wrap{flex:1;overflow:auto;padding:0}
.lv-table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.lv-table thead th{padding:9px 12px;background:var(--s2);border-bottom:2px solid var(--border);font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:2}
.lv-table thead th:hover{background:var(--s3);color:var(--text)}
.lv-table thead th.sort-asc::after{content:" ↑"}
.lv-table thead th.sort-desc::after{content:" ↓"}
.lv-table tbody tr{border-bottom:1px solid var(--border);transition:.1s;cursor:pointer}
.lv-table tbody tr:hover{background:var(--s2)}
.lv-table tbody td{padding:9px 12px;vertical-align:middle;white-space:nowrap}
.lv-table tbody td.wrap{white-space:normal;max-width:220px}
.lv-filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--s2);color:var(--t2);transition:.15s}
.lv-filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.lv-filter-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
select.fsel{padding:4px 8px;border-radius:var(--r);font-size:12px;border:1px solid var(--border);background:var(--surface);font-family:inherit;cursor:pointer;white-space:nowrap;max-width:130px}

/* ── Task Generator 2.0 ─────────────────────────────────── */
.tg2-app{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tg2-subnav{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--s2);padding:0 16px;height:40px;flex-shrink:0}
.tg2-tab{padding:0 13px;height:40px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;user-select:none;font-weight:500}
.tg2-tab:hover{color:var(--text)}
.tg2-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tg2-body{flex:1;overflow:hidden;display:flex}
/* templates view */
.tg2-left{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);flex-shrink:0}
.tg2-right{flex:1;overflow-y:auto;background:var(--bg);padding:16px}
.tg2-proj-row{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--surface);cursor:pointer;transition:.15s;user-select:none}
.tg2-proj-row:hover{background:var(--s2)}
.tg2-proj-row.active{background:var(--al);border-left:3px solid var(--accent)}
.tg2-proj-row.drag-over{background:var(--al);border-top:2px solid var(--accent)}
/* frequency tags */
.freq-tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--s2);color:var(--t2);transition:.15s;white-space:nowrap}
.freq-tag:hover{border-color:var(--accent);color:var(--accent)}
.freq-tag.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
/* template card */
.tmpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:14px 16px;margin-bottom:10px;transition:.2s}
.tmpl-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.tmpl-card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tmpl-freq-badge{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--accent);color:#fff}
/* milestone link card */
.ms-link-card{background:var(--surface);border:1.5px solid var(--purple)33;border-radius:var(--r);padding:10px 14px;margin-bottom:8px}

/* ── Line Up ────────────────────────────────────────────── */
.lu-app{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lu-hdr{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.lu-body{flex:1;display:flex;overflow:hidden}
.lu-main{flex:1;overflow-y:auto;padding:12px;min-width:0}
.lu-hidden-panel{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;position:relative}
.lu-resizer{width:5px;cursor:col-resize;background:var(--border);flex-shrink:0;transition:.15s}
.lu-resizer:hover{background:var(--accent)}
.lu-hidden-head{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px;font-weight:800;color:var(--t2);display:flex;align-items:center;gap:6px}
.lu-hidden-body{flex:1;overflow-y:auto;padding:8px}
/* line up cards by mood size */
.lu-card{display:flex;align-items:center;gap:10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);padding:8px 12px;margin-bottom:6px;cursor:grab;transition:.15s}
.lu-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:var(--b2)}
.lu-card.dragging{opacity:.4}
.lu-card.drag-over-top{border-top:3px solid var(--accent)}
.lu-card.drag-over-bottom{border-bottom:3px solid var(--accent)}
/* size variants */
.lu-card.size-narrow{padding:6px 12px}
.lu-card.size-mid{padding:11px 14px}
.lu-card.size-big{padding:16px 16px}
.lu-card.size-big .lu-title{font-size:15px;font-weight:800}
.lu-card.size-mid .lu-title{font-size:13px;font-weight:700}
.lu-card.size-narrow .lu-title{font-size:12px;font-weight:600}
.lu-drag-handle{color:var(--t3);cursor:grab;font-size:16px;flex-shrink:0}
.lu-mood-chip{display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;font-weight:700}
.lu-card.size-big .lu-mood-chip{width:38px;height:38px;font-size:18px}
.lu-card.size-mid .lu-mood-chip{width:30px;height:30px;font-size:15px}
.lu-card.size-narrow .lu-mood-chip{width:24px;height:24px;font-size:12px}
.lu-info{flex:1;min-width:0}
.lu-title{color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lu-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lu-meta-chip{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.lu-status-sel{font-size:11px;padding:2px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:inherit;cursor:pointer;font-weight:700}
.lu-time-chip{font-size:11px;font-weight:700;color:var(--t2);background:var(--s2);padding:2px 8px;border-radius:10px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.lu-hide-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:.15s}
.lu-hide-btn:hover{background:var(--wl);color:var(--warn);border-color:var(--warn)}
.lu-open-btn{flex-shrink:0}
.lu-hidden-card{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;border:1px solid var(--border);background:var(--s2);margin-bottom:5px;font-size:12px}
.lu-hidden-card .lu-title{font-size:12px;font-weight:600}
.lu-restore-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--accent);background:var(--al);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}

/* ── PLAYGROUND ───────────────────────────────────────────── */
.pg-app{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.pg-topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto}
.pg-tabs{display:flex;align-items:center;gap:0;flex:1;overflow-x:auto;min-width:0}
.pg-tab-btn{padding:6px 16px;border:1px solid var(--border);border-right:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--s2);color:var(--t2);transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:6px;height:34px}
.pg-tab-btn:first-child{border-radius:var(--r) 0 0 var(--r)}
.pg-tab-btn:last-of-type{border-right:1px solid var(--border);border-radius:0 var(--r) var(--r) 0}
.pg-tab-btn.active{background:var(--surface);color:var(--accent);border-bottom-color:var(--surface);font-weight:700}
.pg-tab-btn .del-tab{width:14px;height:14px;border-radius:50%;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:.15s;flex-shrink:0}
.pg-tab-btn .del-tab:hover{background:var(--wl);color:var(--warn)}
.pg-body{flex:1;overflow:auto;padding:14px}
/* grid table */
.pg-table{border-collapse:collapse;min-width:100%;table-layout:fixed}
.pg-table td{border:1px solid var(--border);padding:0;min-width:120px;width:160px;height:36px;position:relative;vertical-align:top}
.pg-cell{width:100%;height:100%;min-height:36px;padding:5px 8px;font-size:13px;font-family:inherit;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.4;overflow:hidden}
.pg-cell:focus{background:var(--al);z-index:2}
.pg-cell.has-task{background:var(--accent-light)!important;color:var(--accent);font-weight:600}
.pg-cell-actions{position:absolute;top:2px;right:2px;display:none;gap:3px;z-index:5}
td:hover .pg-cell-actions{display:flex}
.pg-cell-btn{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:var(--surface);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:.15s;color:var(--t2)}
.pg-cell-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg-cell-btn.task-done{background:var(--al);color:var(--accent);border-color:var(--accent)}

/* ── SETTINGS REDESIGN ─────────────────────────────────────── */
.st-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:20px}
.st-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);overflow:hidden;display:flex;flex-direction:column;max-height:360px}
.st-panel-head{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.st-panel-head h3{font-size:13px;font-weight:800;letter-spacing:-.2px}
.st-panel-body{flex:1;overflow-y:auto;padding:6px 0}
.st-li{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:12px;transition:.1s;cursor:default}
.st-li:last-child{border-bottom:none}
.st-li:hover{background:var(--s2)}
.st-li.drag-over{background:var(--al);border-top:2px solid var(--accent)}
.st-drag{color:var(--t3);cursor:grab;font-size:14px;flex-shrink:0}
.st-li-name{flex:1;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-li-sub{font-size:11px;color:var(--t3);margin-left:4px}
.st-li-actions{display:flex;gap:4px;flex-shrink:0}

/* ── LINE UP REDESIGN ──────────────────────────────────────── */
/* exact heights per size — 96px ≈ 1 inch on screen */
.lu-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:.2s;position:relative;display:flex;align-items:stretch;overflow:hidden;cursor:pointer}
.lu-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:var(--b2);transform:translateY(-1px)}
/* narrow: ~0.5 inch = 48px */
.lu-card.size-narrow{height:48px;min-height:48px;max-height:48px;border-radius:8px}
/* mid: ~2 inch = 192px */
.lu-card.size-mid{height:192px;min-height:192px;max-height:192px}
.lu-card.size-big{height:288px;min-height:288px;max-height:288px;border-radius:12px}
/* mood bar */
.lu-mood-bar{width:4px;flex-shrink:0;align-self:stretch}
.lu-card.size-big .lu-mood-bar{width:5px}
/* drag handle */
.lu-drag-handle{color:var(--t3);cursor:grab;font-size:13px;flex-shrink:0;padding:0 4px;align-self:center;opacity:.5;transition:.15s}
.lu-card:hover .lu-drag-handle{opacity:1}
/* mood chip */
.lu-mood-chip{display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border-radius:8px}
.lu-card.size-narrow .lu-mood-chip{width:36px;height:36px;margin:6px 4px;font-size:14px}
.lu-card.size-mid .lu-mood-chip{width:48px;height:48px;margin:10px 6px;font-size:20px}
.lu-card.size-big .lu-mood-chip{width:60px;height:60px;margin:16px 8px;font-size:26px}
.lu-mood-name{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;line-height:1;display:block;margin-top:2px}
.lu-card.size-narrow .lu-mood-name{display:none}
/* info block */
.lu-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:0 6px 0 2px;overflow:hidden}
.lu-card.size-narrow .lu-info{padding:0 4px;justify-content:center}
.lu-card.size-mid .lu-info{padding:14px 10px 14px 2px;justify-content:flex-start;gap:8px}
.lu-card.size-big .lu-info{padding:20px 14px 20px 2px;justify-content:flex-start;gap:12px}
/* titles */
.lu-title{color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.lu-card.size-narrow .lu-title{font-size:12px;font-weight:600;line-height:1}
.lu-card.size-mid .lu-title{font-size:15px;font-weight:700;white-space:normal;line-height:1.35;overflow:visible;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.lu-card.size-big .lu-title{font-size:20px;font-weight:800;letter-spacing:-.4px;white-space:normal;line-height:1.3;overflow:visible;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
/* meta */
.lu-meta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.lu-card.size-narrow .lu-meta-row{display:none}
.lu-meta-chip{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
/* status select */
.lu-status-sel{font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:inherit;cursor:pointer;font-weight:700;max-width:110px}
/* time chip */
.lu-time-chip{font-size:11px;font-weight:700;color:var(--t2);background:var(--s2);padding:3px 9px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
/* actions column */
.lu-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:0 8px 0 4px;flex-shrink:0}
.lu-card.size-narrow .lu-actions{flex-direction:row;padding:0 8px}
.lu-hide-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--s2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s;flex-shrink:0}
.lu-hide-btn:hover{background:var(--wl);color:var(--warn);border-color:var(--warn)}
.lu-open-btn{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-weight:600;color:var(--t2);transition:.15s;white-space:nowrap}
.lu-open-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── PLAYGROUND SIDEBAR ────────────────────────────────── */
.pg-layout{flex:1;display:flex;overflow:hidden}
.pg-sidebar{width:200px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:.2s}
.pg-sidebar.collapsed{width:32px}
.pg-sidebar-head{padding:9px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pg-sidebar-head span{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;overflow:hidden}
.pg-toggle-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-family:inherit;color:var(--t2)}
.pg-toggle-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg-client-list{flex:1;overflow-y:auto;padding:6px 0}
.pg-client-item{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:12px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--border)}
.pg-client-item:hover{background:var(--s2)}
.pg-client-item:last-child{border-bottom:none}
.pg-client-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pg-client-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-client-ind{font-size:10px;color:var(--t3)}

/* ── SAVED VIEWS ────────────────────────────────────────── */
.sv-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;font-size:12px}
.sv-name{font-weight:700;flex:1}
.sv-active{background:var(--al);border-color:var(--accent)}
.sv-active .sv-name{color:var(--accent)}

/* ── NAV REORDER ────────────────────────────────────────── */
.nav-item-drag{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;font-size:12px;cursor:grab}
.nav-item-drag.drag-over{border-color:var(--accent);background:var(--al)}
.nav-item-drag.dragging{opacity:.4}
.nav-item-drag input[type=text]{flex:1;font-size:12px;padding:3px 7px;border-radius:6px;font-family:inherit}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-brand">Team<span>Map</span></div>
    <div id="nav-tabs-container" style="display:flex;align-items:center;gap:0"></div>
    <div class="ns"></div>
    <div class="sb" id="savebadge"><div class="sd"></div><span>Auto-saved</span></div>
  </div>
  <!-- Task Dashboard (main nav) -->
  <div class="view active" id="view-tkd">
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap" id="tkhdr"></div>
    <div class="task-dash" style="flex:1;overflow:hidden">
      <div class="task-dash-main"><div class="tcols" id="tcols"></div></div>
      <div class="sp">
        <div class="sph"><h4 id="sp-name">Quick View</h4><div style="font-size:10px;color:var(--t3)" id="sp-date"></div></div>
        <div class="spb" id="sp-body"></div>
      </div>
    </div>
  </div>
  <!-- Team Dashboard -->
  <div class="view" id="view-td"><div class="dash" id="dash-content"></div></div>
  <!-- Builder -->
  <div class="view" id="view-bl">
    <div class="builder">
      <div class="panel"><div class="ph"><h3>Team Members</h3><p>Click to select &middot; Drag to link</p></div><div class="pb" id="mlist"></div></div>
      <div class="panel"><div class="ph"><h3>Clients</h3><p>Click to link with selected member</p></div><div class="pb" id="clist"></div></div>
      <div class="canvas"><div class="ci" id="lcanvas"></div></div>
    </div>
  </div>
  <!-- Tasks & Milestones -->
  <div class="view" id="view-tk">
    <div class="task-app">
      <div class="tnav">
        <div class="tt active" id="ttab-tg" onclick="stab('tg')">&#9889; Task Generator</div>
        <div class="tt" id="ttab-ms" onclick="stab('ms')">&#127937; Milestones</div>
        <div class="tt" id="ttab-trash" onclick="stab('trash')">&#128465; Deleted Tasks</div>
      </div>
      <div id="tcontent" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>

  </div>
  <!-- List View -->
  <div class="view" id="view-lv"><div class="lv-wrap" id="lv-wrap"></div></div>
  <!-- Task Generator 2.0 -->
  <div class="view" id="view-tg2">
    <div class="tg2-app" id="tg2-app"></div>
  </div>
  <!-- Line Up -->
  <div class="view" id="view-lu">
    <div class="lu-app" id="lu-app"></div>
  </div>
  <!-- Playground -->
  <div class="view" id="view-pg">
    <div class="pg-app" id="pg-app"></div>
  </div>
  <!-- Settings -->
  <div class="view" id="view-st"><div class="sw"><div class="si" id="scontent"></div></div></div>
</div>
<button id="qabtn" onclick="openTaskModal({})" style="position:fixed;bottom:20px;right:20px;z-index:200;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(45,106,79,.4);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:.2s">+</button>
<div id="mroot"></div>

<script>
// ══════ CONSTANTS ══════════════════════════════════════════════════════════
const COLORS=['#2d6a4f','#2196c4','#7c3aed','#d97706','#e76f51','#0f7c6c','#be185d','#1d4ed8','#059669','#9333ea'];
const DAYS=['M','T','W','T','F','S','S'];
const CATS=['Strategy','Operations','Support','Creative','Technical','Finance','Comms'];
const PRIOS=['Critical','High','Medium','Low'];
const PC={Critical:'#e76f51',High:'#d97706',Medium:'#2d6a4f',Low:'#2196c4'};
const PB={Critical:'#fde8e2',High:'#fef3c7',Medium:'#d8f3dc',Low:'#e3f2fd'};
const CC={Strategy:'#7c3aed',Operations:'#2196c4',Support:'#2d6a4f',Creative:'#e76f51',Technical:'#0f7c6c',Finance:'#d97706',Comms:'#be185d'};
const STATS=['Not Started','Stand Up','WIP','Complete','Pass'];
const STC={};STC['Not Started']='#a09d97';STC['Stand Up']='#e76f51';STC['WIP']='#2196c4';STC['Complete']='#2d6a4f';STC['Pass']='#7c3aed';
const STB={};STB['Not Started']='#f2f0ec';STB['Stand Up']='#fde8e2';STB['WIP']='#e3f2fd';STB['Complete']='#d8f3dc';STB['Pass']='#ede9fe';
const SK='teammap_v4';
const MOOD_ORDER=['top','hero','imp','creative','rapid','share'];

const DMOODS=[
  {id:'top',label:'Top',icon:'🔴',color:'#dc2626',bg:'#fee2e2',desc:'Urgent, do first',max:null,hidden:false,cardSize:'narrow'},
  {id:'hero',label:'Hero',icon:'⚡',color:'#c9920a',bg:'#fffbeb',desc:'High impact, max 2/day',max:2,hidden:false,cardSize:'big'},
  {id:'imp',label:'Imp',icon:'⭐',color:'#7c3aed',bg:'#ede9fe',desc:'Important, max 3/day',max:3,hidden:false,cardSize:'big'},

      if(!S.tags)S.tags=[];
      if(!S.settings)S.settings={maxCap:6,weekends:false,spMember:'m1'};
      if(!S.settings.spMember)S.settings.spMember='m1';
      if(!S.navOrder)S.navOrder=['tkd','tg2','lu','lv','tk','td','bl','pg','st'];
      if(!S.navLabels)S.navLabels={tkd:'Task Dashboard',tg2:'Task Gen 2.0',lu:'Line Up',lv:'List View',tk:'Tasks & Milestones',td:'Team Dashboard',bl:'Builder',pg:'Playground',st:'Settings'};
      if(!S.freqTags)S.freqTags=JSON.parse(JSON.stringify(DS.freqTags));
      if(!S.templates)S.templates=[];
      if(!S.playground)S.playground={tabs:[{id:'pg1',name:'Sheet 1',data:{}}]};
      if(!S.tg2Views)S.tg2Views=[];
      if(!S.lineUpOrder)S.lineUpOrder={};
      if(!S.lineUpHidden)S.lineUpHidden={};
      S.clients.forEach(c=>{if(c.order===undefined)c.order=0;});
      return;
    }
  }catch(e){}
  // Use uploaded backup as starting data
  S=JSON.parse(JSON.stringify(BACKUP_DATA));
  if(!S.tags)S.tags=[];
  if(!S.settings)S.settings={maxCap:6,weekends:false,spMember:'m1'};
  S.clients.forEach(c=>{if(c.order===undefined)c.order=0;});
}

function save(){
  try{
    localStorage.setItem(SK,JSON.stringify(S));
    const el=document.getElementById('savebadge');
    el.style.color='var(--accent)';
    clearTimeout(el._t);
    el._t=setTimeout(()=>{el.style.color='';},1500);
  }catch(e){}
}

// ══════ TASK DASHBOARD ═════════════════════════════════════════════════════

function shiftDate(days){
  const d=new Date(dashDate+'T12:00:00');
  d.setDate(d.getDate()+days);
  dashDate=d.toISOString().slice(0,10);
  rTaskDash();
}
function setDashDate(val){
  if(val) dashDate=val;
  rTaskDash();
}
function shiftGenDate(days){
  const d=new Date(dashDate+'T12:00:00');
  d.setDate(d.getDate()+days);
  dashDate=d.toISOString().slice(0,10);
  rTaskGen();
}

function rTaskDash(){

  // header

    <span class="stl" style="white-space:nowrap">Task Dashboard</span>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="btn btn-sm" style="padding:4px 10px;font-size:15px;font-weight:700" onclick="shiftDate(-1)" title="Previous day">&#8592;</button>
      <input type="date" id="dash-date-inp" value="${dashDate}" onchange="setDashDate(this.value)" style="width:140px;font-size:12px">
      <button class="btn btn-sm" style="padding:4px 10px;font-size:15px;font-weight:700" onclick="shiftDate(1)" title="Next day">&#8594;</button>
    </div>
    <button class="btn btn-sm" onclick="dashDate=today();rTaskDash()" style="font-weight:700">Today</button>
    <span style="font-size:12px;color:var(--t2)">${fmtD(dashDate)}</span>
    <div style="flex:1;display:flex;align-items:center;gap:8px;min-width:0">
      <div style="flex:1;min-width:60px;max-width:200px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:2px">
          <span>Day progress</span><span style="font-weight:700;color:${dayPct===100?'var(--accent)':'var(--t2)'}">${completedTasks}/${totalTasks} &middot; ${dayPct}%</span>
        </div>
        <div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
          <div style="height:100%;border-radius:3px;background:${dayPct===100?'var(--accent)':dayPct>60?'var(--a2)':'var(--info)'};width:${dayPct}%;transition:.4s"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:11px;color:var(--t3)">Side panel:</span>
      <select style="width:110px;font-size:12px;padding:4px 8px" onchange="S.settings.spMember=this.value;save();rTaskDash()">${memberOpts}</select>
      <button class="btn btn-sm btn-p" onclick="openTaskModal({})">+ Quick add</button>
    </div>`;

  // columns
  document.getElementById('tcols').innerHTML=S.members.map(m=>rTeamCol(m,dashDate)).join('');

  // side panel
  const spName=document.getElementById('sp-name');
  const spDate=document.getElementById('sp-date');
  const spBody=document.getElementById('sp-body');
  if(spName)spName.textContent=spM?spM.name:'';
  if(spDate)spDate.textContent=fmtD(dashDate);
  if(spBody)spBody.innerHTML=rSP(spM,dashDate);

function rTeamCol(member,date){
  const allTasks=tasksForMD(member.id,date);
  const visibleTasks=allTasks.filter(t=>t.status!=='Complete');
  const totalCount=allTasks.length;
  const doneCount=allTasks.filter(t=>t.status==='Complete').length;
  const pct=totalCount?Math.round(doneCount/totalCount*100):0;
  const barColor=pct===100?'#2d6a4f':pct>60?'#52b788':'#2196c4';

  const totalMins=allTasks.reduce((a,t)=>a+((t.estH||0)*60+(t.estM||0)),0);
  const totalDisp=totalMins?`${Math.floor(totalMins/60)}h${totalMins%60?' '+totalMins%60+'m':''}`:null;

  // PRIMARY moods shown always in column
  const PRIMARY=['top','hero','imp','creative'];
  // SECONDARY moods in drawer
  const SECONDARY=S.moods.filter(m=>!PRIMARY.includes(m.id)).map(m=>m.id);

  const secTasks=visibleTasks.filter(t=>SECONDARY.includes(t.mood)&&t.status!=='Stand Up');
  const suTasks=visibleTasks.filter(t=>t.status==='Stand Up');

  let h=`<div class="tcol">
    <div class="tcolh" style="border-top:3px solid ${member.color}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        ${avEl(member.name,member.color,22)}
        <span style="font-size:12px;font-weight:800;flex:1">${member.name}</span>
        <span style="font-size:10px;color:var(--t3)">${totalDisp||''}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">
        <span style="color:var(--t3)">${visibleTasks.length} active${doneCount?' &middot; '+doneCount+'&#10003;':''}</span>
        <span style="font-weight:700;color:${pct===100?'var(--accent)':'var(--t2)'}">${pct}%</span>
      </div>
      <div style="height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:4px">
        <div style="height:100%;border-radius:3px;background:${barColor};width:${pct}%;transition:.5s"></div>
      </div>
      ${secTasks.length?`<button onclick="toggleSecDrawer('${member.id}')" style="width:100%;padding:2px 0;background:var(--s3);border:none;border-radius:4px;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;font-family:inherit">&#43; ${secTasks.length} more (Rapids &amp; others)</button>`:''}
    </div>
    <div class="tcolb" id="colb-${member.id}">`;

  // Stand Up
  if(suTasks.length){
    h+=`<div class="msec su-sec">
      <div class="su-head">&#128483; Stand Up <span style="font-size:9px;background:var(--warn);color:#fff;padding:1px 5px;border-radius:8px;margin-left:2px">${suTasks.length}</span></div>
      <div class="msec-tasks">`;
    suTasks.forEach(t=>{h+=rTCard(t,member,'standup');});
    h+=`</div></div>`;
  }

  // Primary moods only
  PRIMARY.forEach(mid=>{
    const mood=gmood(mid);if(!mood)return;
    const mt=visibleTasks.filter(t=>t.mood===mid&&t.status!=='Stand Up');
    const isHero=mid==='hero';
    const isImp=mid==='imp';
    const isTop=mid==='top';
    const isCreative=mid==='creative';
    const secClass=isHero?'hero-sec':isImp?'imp-sec':isTop?'top-sec':'other-sec';

    const moodMins=(allTasks.filter(t=>t.mood===mid)).reduce((a,t)=>a+((t.estH||0)*60+(t.estM||0)),0);
    const moodTimeDisp=moodMins?`${Math.floor(moodMins/60)}h${moodMins%60?' '+moodMins%60+'m':''}`:null;
    const totalMoodCount=allTasks.filter(t=>t.mood===mid).length;
    const doneInMood=totalMoodCount-allTasks.filter(t=>t.mood===mid&&t.status!=='Complete').length;

    let secStyle='';
    if(isHero) secStyle=`background:${mood.bg};border:2px solid ${mood.color}55;`;
    else if(isImp) secStyle=`background:${mood.bg}88;border:1.5px solid ${mood.color}44;`;

    // Top: only show if tasks exist
    if(isTop&&!mt.length) return;
    // Creative: only show if tasks exist
    if(isCreative&&!mt.length) return;

    h+=`<div class="msec ${secClass}" style="${secStyle}">
      <div class="msec-head" style="${isHero?'background:'+mood.color+'15':isImp?'background:'+mood.color+'10':'background:transparent'}">
        <span style="font-size:${isHero?'13px':isImp?'12px':'11px'}">${mood.icon}</span>
        <span class="msec-label" style="color:${mood.color};font-size:${isHero?'11px':isImp?'10.5px':'10px'}">${mood.label}</span>
        <span class="msec-cnt" style="background:${mood.color}22;color:${mood.color}">${mt.length}${mood.max?'/'+mood.max:''}${doneInMood?` <span style="opacity:.55;font-size:8px">${doneInMood}&#10003;</span>`:''}</span>
        ${moodTimeDisp?`<span style="font-size:9px;color:${mood.color};margin-left:auto;font-weight:700;opacity:.7">${moodTimeDisp}</span>`:''}
        <button onclick="event.stopPropagation();openQuickMoodTask('${member.id}','${mid}')" style="width:16px;height:16px;border-radius:50%;background:${mood.color}22;border:1px solid ${mood.color}44;color:${mood.color};font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:inherit;margin-left:${moodTimeDisp?'2px':'auto'}" title="Add ${mood.label} task">+</button>
      </div>
      <div class="msec-tasks">`;
    if(mt.length){
      mt.forEach(t=>{h+=rTCard(t,member,mid);});
    } else {
      h+=`<div style="font-size:10px;color:var(--t3);padding:5px 4px;font-style:italic">No active ${mood.label}</div>`;
    }
    h+=`</div></div>`;
  });

  // Secondary drawer (hidden by default)
  if(secTasks.length){
    h+=`<div id="sec-drawer-${member.id}" style="display:none">`;
    const secMoodsWithTasks=SECONDARY.filter(mid=>visibleTasks.filter(t=>t.mood===mid&&t.status!=='Stand Up').length>0);
    secMoodsWithTasks.forEach(mid=>{
      const mood=gmood(mid);if(!mood)return;
      const mt=visibleTasks.filter(t=>t.mood===mid&&t.status!=='Stand Up');
      h+=`<div class="msec other-sec">
        <div class="msec-head">
          <span style="font-size:11px">${mood.icon}</span>
          <span class="msec-label" style="color:${mood.color};font-size:10px">${mood.label}</span>
          <span class="msec-cnt" style="background:${mood.color}22;color:${mood.color}">${mt.length}</span>
          <button onclick="event.stopPropagation();openQuickMoodTask('${member.id}','${mid}')" style="width:16px;height:16px;border-radius:50%;background:${mood.color}22;border:1px solid ${mood.color}44;color:${mood.color};font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:inherit;margin-left:auto" title="Add task">+</button>
        </div>
        <div class="msec-tasks">`;
      mt.forEach(t=>{h+=rTCard(t,member,mid);});
      h+=`</div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<button class="addbtn" style="font-size:11px;flex-shrink:0" onclick="openTaskForMember('${member.id}')">+ Task</button>`;
  h+=`</div></div>`;
  return h;
}

function toggleSecDrawer(memberId){
  const el=document.getElementById('sec-drawer-'+memberId);
  const btn=el&&el.previousElementSibling;
  if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'flex':'none';
  el.style.flexDirection='column';
  el.style.gap='3px';
  // update button text
  const hdrBtn=document.querySelector(`#colb-${memberId}`);
  const tBtn=document.querySelector(`button[onclick="toggleSecDrawer('${memberId}')"]`);
  if(tBtn) tBtn.textContent=open?'▲ Hide rapids & others':'＋ '+(el.querySelectorAll('.tcard').length)+' more (Rapids & others)';
}

function rTCard(task,member,moodId){
  const mood=gmood(task.mood||moodId);
  const isHero=task.mood==='hero';
  const isTop=task.mood==='top';
  const isImp=task.mood==='imp';
  const isLight=!isHero&&!isImp&&!isTop;
  const client=gc(task.clientId);
  const timeStr=taskTimeStr(task);
  const taskTags=task.tags?task.tags.map(tid=>{const tg=gtag(tid);return tg?`<span class="ttag-chip">${tg.label}</span>`:''}).join(''):'' ;
  const extraClass=isHero?' hero':isImp?' imp-card':isTop?' top':isLight?' light':'';

  // Card background: white for hero/imp, light grey for others
  // Mood colour only on label/meta, not the card bg
  return `<div class="tcard${extraClass}"
    onclick="openTaskDetail('${task.id}')">
    <div style="display:flex;align-items:flex-start;gap:4px;margin-bottom:2px">
      <div class="tcn" style="flex:1">${task.isMilestone?'&#127937; ':''}${task.name}</div>
    </div>
    ${client?`<div class="tcc" style="color:${mood.color};font-weight:600">${client.name}</div>`:''}
    <div class="tcs-row">
      <span class="tcs" style="background:${STB[task.status]};color:${STC[task.status]}" onclick="event.stopPropagation();showStPop(event,'${task.id}','${member.id}')">${task.status} &#9660;</span>
      ${timeStr?`<span class="ttime">${timeStr}</span>`:''}
    </div>
    ${taskTags?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">${taskTags}</div>`:''}
    ${task.assignedTo&&task.assignedTo.length>1?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">${task.assignedTo.filter(id=>id!==member.id).map(id=>{const m=gm(id);return m?`<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:var(--s2);border:1px solid var(--border);font-weight:600;color:var(--t2)">${m.name}</span>`:''}).join('')}</div>`:''}
  </div>`;
}

// Inline status popup
let _stPopTask=null;
function showStPop(e,taskId,memberId){
  e.stopPropagation();
  closeStPop();
  _stPopTask=taskId;
  const pop=document.createElement('div');
  pop.className='st-popup open';
  pop.id='stpop';
  pop.style.position='fixed';
  pop.style.zIndex='500';
  const r=e.target.getBoundingClientRect();
  pop.style.top=(r.bottom+4)+'px';

  STATS.forEach(s=>{
    const d=document.createElement('div');

    d.onclick=(ev)=>{ev.stopPropagation();setTaskStatus(taskId,s);closeStPop();};

function closeStPop(){const p=document.getElementById('stpop');if(p)p.remove();}
function setTaskStatus(taskId,status){
  const t=S.tasks.find(t=>t.id===taskId);if(!t)return;
  t.status=status;save();rTaskDash();
}

function rSP(member,date){
  if(!member)return'<div style="font-size:12px;color:var(--t3)">No member selected</div>';
  const tasks=tasksForMD(member.id,date);
  const topT=tasks.filter(t=>t.mood==='top');
  const rapT=tasks.filter(t=>t.mood==='rapid');
  // "follow ups" = share mood tasks
  const shareT=tasks.filter(t=>t.mood==='share');
  const heroT=tasks.filter(t=>t.mood==='hero');
  let h='';

  if(topT.length){
    h+=`<div class="spsec"><div class="spst" style="color:#dc2626">&#128308; Top — Urgent</div>`;
    topT.forEach(t=>{const c=gc(t.clientId);
      h+=`<div class="spt" onclick="openTaskDetail('${t.id}')" style="border-left:3px solid #dc2626;background:#fff8f7">
        <div class="sptn">${t.name}</div>
        <div class="sptm">${c?'<span style="color:#dc2626;font-weight:600">'+c.name+'</span> &middot; ':''} ${t.status}${taskTimeStr(t)?' &middot; '+taskTimeStr(t):''}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(heroT.length){
    h+=`<div class="spsec"><div class="spst" style="color:#d97706">&#9889; Hero</div>`;
    heroT.forEach(t=>{const c=gc(t.clientId);
      h+=`<div class="spt" onclick="openTaskDetail('${t.id}')" style="border-left:3px solid #d97706;background:#fffbf0">
        <div class="sptn">${t.name}</div>
        <div class="sptm">${c?c.name+' &middot; ':''}${t.status}${taskTimeStr(t)?' &middot; '+taskTimeStr(t):''}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(rapT.length){
    h+=`<div class="spsec"><div class="spst" style="color:#0f7c6c">&#128168; Rapids</div>`;
    rapT.forEach(t=>{const c=gc(t.clientId);
      h+=`<div class="spt" onclick="openTaskDetail('${t.id}')">
        <div class="sptn">${t.name}</div>
        <div class="sptm">${c?c.name+' &middot; ':''}${t.status}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(shareT.length){
    h+=`<div class="spsec"><div class="spst" style="color:#2196c4">&#128279; Follow-ups / Share</div>`;
    shareT.forEach(t=>{const c=gc(t.clientId);
      h+=`<div class="spt" onclick="openTaskDetail('${t.id}')" style="border-left:3px solid #2196c4">
        <div class="sptn">${t.name}</div>
        <div class="sptm">${c?c.name+' &middot; ':''}${t.status}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(!topT.length&&!heroT.length&&!rapT.length&&!shareT.length){
    h=`<div style="font-size:12px;color:var(--t3);padding:8px 0">No Top, Hero, Rapid or Follow-up tasks for this date.</div>`;
  }
  return h;
}

        <button class="btn btn-sm" style="padding:3px 10px;font-size:15px;font-weight:700" onclick="shiftGenDate(-1)">&#8592;</button>
        <input type="date" id="gen-date-inp" value="${dashDate}" onchange="dashDate=this.value;rTaskGen()" style="width:145px;font-size:12px">
        <button class="btn btn-sm" style="padding:3px 10px;font-size:15px;font-weight:700" onclick="shiftGenDate(1)">&#8594;</button>
        <button class="btn btn-xs" onclick="dashDate=today();rTaskGen()" style="font-weight:700">Today</button>
        <span style="font-size:12px;color:var(--t2)">${fmtD(dashDate)}</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px">${rRecentTasks()}</div>
    </div>
  </div>`;
}

function rCTRow(client){
  return `<div class="ctr" id="ctr-${client.id}" draggable="true"
    ondragstart="dragCid='${client.id}';this.style.opacity='.5'"
    ondragend="dragCid=null;this.style.opacity='1'"
    ondragover="event.preventDefault();this.classList.add('dov')"
    ondragleave="this.classList.remove('dov')"
    ondrop="event.preventDefault();this.classList.remove('dov');reorderC('${client.id}')">
    <div style="padding:8px 6px;color:var(--t3);cursor:grab;font-size:16px">&#8942;</div>
    <div style="flex:1;padding:10px 8px;min-width:0">
      <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${client.color}"></div><span style="font-size:13px;font-weight:600">${client.name}</span></div>
      <div style="font-size:11px;color:var(--t3)">${client.industry}</div>
    </div>
    <div style="padding:6px 10px"><button class="btn btn-xs btn-p" onclick="openTaskForClient('${client.id}')">+ Task</button></div>
  </div>`;
}

function rRecentTasks(){
  const tasks=tasksOnDate(dashDate);
  if(!tasks.length)return`<div style="font-size:13px;color:var(--t3);text-align:center;padding:40px 0">No tasks for ${fmtD(dashDate)}</div>`;
  return`<div style="display:flex;flex-direction:column;gap:6px">`+tasks.map(t=>{
    const mood=gmood(t.mood),client=gc(t.clientId);
    const assignees=t.assignedTo?t.assignedTo.map(id=>{const m=gm(id);return m?m.name:''}).filter(Boolean):[];
    const timeStr=taskTimeStr(t);
    return`<div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid ${mood.color};border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s" onclick="openTaskDetail('${t.id}')" onmouseover="this.style.borderColor='var(--a2)'" onmouseout="this.style.borderColor='var(--border)'">
      <span style="font-size:16px">${mood.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px">${t.isMilestone?'&#127937; ':''}${t.name}</div>
        <div style="font-size:11px;color:var(--t3)">${client?client.name+' &middot; ':''}${assignees.join(', ')||'Unassigned'}${timeStr?' &middot; '+timeStr:''}</div>
      </div>
      ${badgeEl(t.status,STB[t.status],STC[t.status])}
      ${badgeEl(mood.label,mood.bg,mood.color)}
      <button class="btn btn-xs btn-d" onclick="event.stopPropagation();delTask('${t.id}')">&#128465;</button>
    </div>`;
  }).join('')+'</div>';
}

function reorderC(tid){
  if(!dragCid||dragCid===tid)return;
  const cl=scl();
  const di=cl.findIndex(c=>c.id===dragCid),ti=cl.findIndex(c=>c.id===tid);
  const [dr]=cl.splice(di,1);cl.splice(ti,0,dr);
  cl.forEach((c,i)=>{const sc=S.clients.find(x=>x.id===c.id);if(sc)sc.order=i;});
  save();rTaskGen();
}

// ══════ TRASH ══════════════════════════════════════════════════════════════
function rTrash(){
  const el=document.getElementById('tcontent');
  const deleted=S.tasks.filter(t=>t.deleted);
  let h=`<div style="padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0">
    <span class="stl">&#128465; Deleted Tasks</span>
    <span style="font-size:12px;color:var(--t3)">${deleted.length} task${deleted.length!==1?'s':''}</span>
    ${deleted.length?`<button class="btn btn-sm btn-d" style="margin-left:auto" onclick="purgeAll()">Purge all</button>`:''}
  </div>
  <div style="flex:1;overflow-y:auto;padding:16px">`;
  if(!deleted.length){
    h+=`<div style="text-align:center;padding:60px 0;color:var(--t3)"><div style="font-size:36px;margin-bottom:10px">&#128465;</div><div style="font-size:14px;font-weight:600;color:var(--t2)">No deleted tasks</div></div>`;
  } else {
    h+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    deleted.forEach(t=>{
      const mood=gmood(t.mood),client=gc(t.clientId);
      const assignees=t.assignedTo?t.assignedTo.map(id=>{const m=gm(id);return m?m.name:''}).filter(Boolean):[];
      h+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;opacity:.7">
        <span style="font-size:16px">${mood.icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px;text-decoration:line-through">${t.name}</div>
          <div style="font-size:11px;color:var(--t3)">${client?client.name+' &middot; ':''}${assignees.join(', ')||'Unassigned'} &middot; ${fmtD(t.date)}</div>
        </div>
        <button class="btn btn-sm" onclick="recoverTask('${t.id}')">&#8630; Recover</button>
        <button class="btn btn-sm btn-d" onclick="purgeTask('${t.id}')">Delete permanently</button>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

function recoverTask(id){const t=S.tasks.find(t=>t.id===id);if(t)delete t.deleted;save();rTrash();}
function purgeTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);save();rTrash();}
function purgeAll(){if(!confirm('Permanently delete all trashed tasks?'))return;S.tasks=S.tasks.filter(t=>!t.deleted);save();rTrash();}

// ══════ MILESTONES ═════════════════════════════════════════════════════════
function rMS(){
  const el=document.getElementById('tcontent');
  const ms=S.milestones.filter(m=>!m.deleted);
  let h=`<div style="padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0">
    <span class="stl">Milestones</span>
    <button class="btn btn-sm btn-p" onclick="openAddMS()">+ New milestone</button>
    <span style="font-size:12px;color:var(--t3);margin-left:auto">${ms.length} total</span>
  </div>
  <div style="flex:1;overflow-y:auto;padding:20px">`;

  if(!ms.length){
    h+=`<div style="text-align:center;padding:60px 0;color:var(--t3)"><div style="font-size:36px;margin-bottom:10px">&#127937;</div><div style="font-size:14px;font-weight:600;color:var(--t2)">No milestones yet</div><div style="font-size:12px;margin-top:4px">Create one or convert a task to a milestone</div></div>`;
  } else {
    h+=`<div style="display:flex;flex-direction:column;gap:12px">`;
    ms.forEach(m=>{
      const lt=S.tasks.filter(t=>t.milestoneId===m.id&&!t.deleted);
      const done=lt.filter(t=>t.status==='Complete').length;
      const next=lt.find(t=>t.status!=='Complete');
      const pct=lt.length?Math.round(done/lt.length*100):0;
      const asgn=(m.assignedTo||[]).map(id=>{const mb=gm(id);return mb?mb.name:''}).filter(Boolean);
      // accumulated time
      const totalMins=lt.reduce((a,t)=>a+((t.estH||0)*60+(t.estM||0)),0);
      const timeDisp=totalMins?`${Math.floor(totalMins/60)}h${totalMins%60?' '+totalMins%60+'m':''}`:null;
      h+=`<div style="background:var(--surface);border:2px solid ${m.color||'var(--accent)'}44;border-radius:var(--rl2);padding:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:20px">&#127937;</span>
          <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:15px">${m.name}</div>${m.description?`<div style="font-size:12px;color:var(--t2);margin-top:2px">${m.description}</div>`:''}</div>
          <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap">${asgn.map(n=>pillEl(n,'var(--s2)','var(--t2)','var(--border)')).join('')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <div style="flex:1"><div class="cb" style="height:6px"><div class="cf" style="width:${pct}%;background:${m.color||'var(--accent)'}"></div></div></div>
          <span style="font-size:12px;color:var(--t2);white-space:nowrap">${done}/${lt.length} tasks &middot; ${pct}%${timeDisp?' &middot; '+timeDisp:''}</span>
        </div>
        ${next?`<div style="font-size:12px;color:var(--t2);padding:7px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--t3)">Next &rarr; </span>${next.name}</div>`:''}
        ${lt.slice(0,5).map((t,i)=>`<div class="lrow"><div class="lord">${i+1}</div><span style="flex:1;font-size:12px">${t.name}</span>${taskTimeStr(t)?`<span style="font-size:10px;color:var(--t3)">${taskTimeStr(t)}</span>`:''} ${badgeEl(t.status,STB[t.status],STC[t.status])}</div>`).join('')}
        ${lt.length>5?`<div style="font-size:11px;color:var(--t3);padding:4px 6px">+${lt.length-5} more tasks</div>`:''}
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="btn btn-xs" onclick="openEditMS('${m.id}')">Edit</button>
          <button class="btn btn-xs" onclick="openTaskForMS('${m.id}')">+ Add task</button>
          <button class="btn btn-xs btn-d" onclick="delMS('${m.id}')">Delete</button>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

// ══════ TASK MODAL ═════════════════════════════════════════════════════════
function openTaskForClient(cid){openTaskModal({clientId:cid,date:dashDate});}
function openTaskForMember(mid){openTaskModal({assignedTo:[mid],date:dashDate});}
function openTaskForMS(msId){openTaskModal({milestoneId:msId,date:dashDate,isMilestone:true});}
function openTaskDetail(id){const t=S.tasks.find(t=>t.id===id);if(t)openTaskModal(t);}
function delTask(id){const t=S.tasks.find(t=>t.id===id);if(t)t.deleted=true;save();rTaskDash();if(ctab==='tg')rTaskGen();}

function openTaskModal(t){
  t=t||{};
  _mood=t.mood||'';
  _status=t.status||'Not Started';
  _assigned=t.assignedTo?[...t.assignedTo]:[];
  _tags=t.tags?[...t.tags]:[];
  const date=t.date||dashDate||today();
  const isEdit=!!t.id;

  const moodBtns=S.moods.map(m=>{
    const on=_mood===m.id;
    return `<div class="mood-opt-btn${on?' on':''}" style="${on?'background:'+m.bg+';color:'+m.color+';border-color:'+m.color+';border-width:2px':''}" onclick="pickTMood('${m.id}',this)">${m.icon} ${m.label}${m.max?` <span style="font-size:9px;opacity:.6">max${m.max}</span>`:''}</div>`;
  }).join('');

  // Status as dropdown options
  const statOpts=STATS.map(s=>`<option value="${s}" ${_status===s?'selected':''}>${s}</option>`).join('');

  const teamBtns=S.members.map(m=>{
    const on=_assigned.includes(m.id);
    return `<div class="ttagopt${on?' on':''}" onclick="togTAssign('${m.id}',this)">${avEl(m.name,m.color,16)} ${m.name}</div>`;
  }).join('');

  const tagBtns=(S.tags||[]).map(tg=>{
    const on=_tags.includes(tg.id);
    return `<div class="tcp${on?' on':''}" onclick="togTag('${tg.id}',this)">${tg.label}</div>`;
  }).join('');

  // Clients as scrollable tags
  const clientTags=scl().map(c=>{
    const on=t.clientId===c.id;
    return `<div onclick="pickTClient('${c.id}',this)" data-cid="${c.id}" class="client-tag-opt${on?' on':''}" style="flex-shrink:0;padding:4px 11px;border-radius:20px;border:1.5px solid ${on?c.color:'var(--border)'};background:${on?c.color+'18':'var(--s2)'};color:${on?c.color:'var(--t2)'};font-size:12px;font-weight:${on?'700':'500'};cursor:pointer;white-space:nowrap;transition:.15s">${c.name}</div>`;
  }).join('');

  const msOpts=`<option value="">&#8212; None &#8212;</option>`+S.milestones.filter(m=>!m.deleted).map(m=>`<option value="${m.id}" ${t.milestoneId===m.id?'selected':''}>${m.name}</option>`).join('');

  openModal(`<div class="modal modal-lg">
    <h2 style="margin-bottom:12px">${isEdit?'Edit task':'New task'}</h2>
    <div style="font-size:11px;color:var(--warn);margin-bottom:10px">* Task name, assigned to &amp; mood are required</div>

    <label class="fl" style="margin-top:0">Task name *</label>
    <input id="tn" type="text" placeholder="What needs to be done?" value="${t.name||''}" oninput="clearReq('tn')">

    <label class="fl">Mood *</label>
    <div class="mood-pick-row" id="mprow">${moodBtns}</div>

    <label class="fl">Assign to *</label>
    <div class="ttag-row" id="tarow">${teamBtns}</div>

    <label class="fl">Client / Project</label>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-top:6px" id="client-tag-row">${clientTags}</div>
    <input type="hidden" id="tc" value="${t.clientId||''}">

    <label class="fl">Date</label>
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap">
      <input type="date" id="td2" value="${date}" style="width:150px;font-size:13px">
      <button class="btn btn-xs" onclick="document.getElementById('td2').value=today()">Today</button>
      <button class="btn btn-xs" onclick="setModalDateOffset(1)">Tomorrow</button>
      <button class="btn btn-xs" onclick="setModalDateOffset(-1)">Yesterday</button>
    </div>

    <label class="fl">Status</label>
    <select id="tst" style="width:180px;margin-top:6px">${statOpts}</select>

    <div style="display:flex;gap:12px;margin-top:14px;align-items:flex-start">
      <div style="flex:0 0 160px">
        <label class="fl" style="margin-top:0">Est. time</label>
        <div style="display:flex;gap:6px;align-items:center;margin-top:6px">
          <input id="teh" type="number" placeholder="0" min="0" max="99" value="${t.estH||''}" style="width:58px"> <span style="font-size:12px;color:var(--t2)">h</span>
          <input id="tem" type="number" placeholder="0" min="0" max="59" value="${t.estM||''}" style="width:58px"> <span style="font-size:12px;color:var(--t2)">m</span>
        </div>
      </div>
      <div style="flex:1">
        <label class="fl" style="margin-top:0">Notes</label>
        <textarea id="tnotes" placeholder="Notes&hellip;" style="min-height:52px;margin-top:6px">${t.notes||''}</textarea>
      </div>
    </div>

    <label class="fl">Tags</label>
    <div class="tag-chip-pick" id="tagpick">${tagBtns}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <input id="newtag" type="text" placeholder="Type new tag + Enter" style="flex:1;font-size:12px;padding:5px 9px" onkeydown="if(event.key==='Enter'){event.preventDefault();addTagInline();}">
      <button class="btn btn-sm" onclick="addTagInline()">+ Tag</button>
    </div>

    <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="tms" ${t.isMilestone?'checked':''} onchange="document.getElementById('tmsrow').style.display=this.checked?'block':'none'">
      <label for="tms" style="font-size:13px;font-weight:600;cursor:pointer">Milestone task</label>
    </div>
    <div id="tmsrow" style="display:${t.isMilestone||t.milestoneId?'block':'none'}">
      <label class="fl">Link to milestone</label>
      <select id="tmsid">${msOpts}</select>
    </div>

    ${isEdit?`<input type="hidden" id="texid" value="${t.id}">`:''}
    <div class="ma">
      ${isEdit?`<button class="btn btn-d" onclick="confirmDelTask('${t.id}')">&#128465; Delete</button>`:''}
      <button class="btn btn-g" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveTask()">Save task</button>
    </div>
  </div>`);
  setTimeout(()=>{const f=document.getElementById('tn');if(f)f.focus();},60);
}

function pickTClient(cid,el){
  const cur=document.getElementById('tc').value;
  const newVal=cur===cid?'':cid;
  document.getElementById('tc').value=newVal;
  document.querySelectorAll('.client-tag-opt').forEach(e=>{
    const c=gc(e.dataset.cid);
    const on=e.dataset.cid===newVal;
    e.classList.toggle('on',on);
    e.style.borderColor=on&&c?c.color:'var(--border)';
    e.style.background=on&&c?c.color+'18':'var(--s2)';
    e.style.color=on&&c?c.color:'var(--t2)';
    e.style.fontWeight=on?'700':'500';
  });
}

function setModalDateOffset(days){
  const cur=document.getElementById('td2').value||today();
  const d=new Date(cur+'T12:00:00');
  d.setDate(d.getDate()+days);
  document.getElementById('td2').value=d.toISOString().slice(0,10);
}

function confirmDelTask(id){
  if(!confirm('Delete this task? It will move to the Deleted Tasks section where you can recover it.'))return;
  delTaskFromModal(id);
}

function clearReq(id){const el=document.getElementById(id);if(el)el.classList.remove('req');}

function pickTMood(id,el){
  _mood=id;const mood=gmood(id);
  document.querySelectorAll('#mprow .mood-opt-btn').forEach(e=>{e.classList.remove('on');e.style.cssText='';});
  el.classList.add('on');el.style.background=mood.bg;el.style.color=mood.color;el.style.borderColor=mood.color;el.style.borderWidth='2px';
}
function pickTStatus(s,el){
  _status=s;
  document.querySelectorAll('#stprow .stopt').forEach(e=>{e.classList.remove('on');e.style.cssText='';});
  el.classList.add('on');el.style.background=STB[s];el.style.color=STC[s];el.style.borderColor=STC[s];
}
function togTAssign(id,el){
  const i=_assigned.indexOf(id);
  if(i>=0){_assigned.splice(i,1);el.classList.remove('on');}
  else{_assigned.push(id);el.classList.add('on');}
}
function togTag(id,el){
  const i=_tags.indexOf(id);
  if(i>=0){_tags.splice(i,1);el.classList.remove('on');}
  else{_tags.push(id);el.classList.add('on');}
}
function addTagInline(){
  const inp=document.getElementById('newtag');if(!inp)return;
  const label=inp.value.trim();if(!label)return;
  // check if already exists
  let existing=S.tags.find(t=>t.label.toLowerCase()===label.toLowerCase());
  if(!existing){
    existing={id:uid(),label,color:COLORS[S.tags.length%COLORS.length]};
    S.tags.push(existing);save();
  }
  if(!_tags.includes(existing.id))_tags.push(existing.id);
  inp.value='';
  // refresh tag picker
  const pick=document.getElementById('tagpick');
  if(pick){
    pick.innerHTML=(S.tags||[]).map(tg=>{
      const on=_tags.includes(tg.id);
      return `<div class="tcp${on?' on':''}" onclick="togTag('${tg.id}',this)">${tg.label}</div>`;
    }).join('');
  }
}

function delTaskFromModal(id){
  const t=S.tasks.find(t=>t.id===id);if(t)t.deleted=true;
  save();closeModal();rTK();rTaskDash();
}

function saveTask(){
  const nameEl=document.getElementById('tn');
  const name=nameEl.value.trim();
  let valid=true;
  if(!name){nameEl.classList.add('req');nameEl.focus();valid=false;}
  if(!_mood){
    document.querySelectorAll('#mprow .mood-opt-btn').forEach(e=>e.style.outline='2px solid var(--warn)');
    valid=false;
  }
  if(!_assigned.length){
    document.querySelectorAll('#tarow .ttagopt').forEach(e=>e.style.outline='2px solid var(--warn)');
    valid=false;
  }
  if(!valid)return;

  const isMs=document.getElementById('tms').checked;
  const msidEl=document.getElementById('tmsid');
  let msId=msidEl?msidEl.value||null:null;
  const existId=document.getElementById('texid')?.value;
  const statusEl=document.getElementById('tst');
  const chosenStatus=statusEl?statusEl.value:_status;

  if(isMs&&!msId){
    const nm={id:uid(),name,description:'',color:gmood(_mood).color||COLORS[0],assignedTo:[..._assigned],createdAt:Date.now()};
    S.milestones.push(nm);msId=nm.id;
  }

  const td={
    name,
    clientId:document.getElementById('tc').value||null,
    date:document.getElementById('td2').value||today(),
    mood:_mood,
    status:chosenStatus,
    assignedTo:[..._assigned],
    tags:[..._tags],
    estH:parseInt(document.getElementById('teh').value)||0,
    estM:parseInt(document.getElementById('tem').value)||0,
    notes:document.getElementById('tnotes').value.trim(),
    isMilestone:isMs,milestoneId:msId,
    updatedAt:Date.now()
  };

  if(existId){const t=S.tasks.find(t=>t.id===existId);if(t)Object.assign(t,td);}
  else S.tasks.push({id:uid(),...td,createdAt:Date.now()});

  save();closeModal();rTaskDash();if(ctab==='tg')rTaskGen();
}

function openAddMS(){
  _msAssigned=[];
  const tb=S.members.map(m=>`<div class="ttagopt" onclick="togMsA('${m.id}',this)">${avEl(m.name,m.color,16)} ${m.name}</div>`).join('');
  openModal(`<div class="modal"><h2>New Milestone</h2>
    <label class="fl">Name *</label><input id="msn" type="text" placeholder="e.g. Q3 Campaign Launch">
    <label class="fl">Description</label><textarea id="msd" placeholder="What does this milestone represent?"></textarea>
    <label class="fl">Assign to</label><div class="ttag-row" id="msarow">${tb}</div>
    <div class="ma"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveMS('')">Create</button></div>
  </div>`);
  setTimeout(()=>{const f=document.getElementById('msn');if(f)f.focus();},60);
}

function openEditMS(id){
  const ms=S.milestones.find(m=>m.id===id);if(!ms)return;
  _msAssigned=[...(ms.assignedTo||[])];
  const lt=S.tasks.filter(t=>t.milestoneId===id&&!t.deleted);
  const tb=S.members.map(m=>`<div class="ttagopt${_msAssigned.includes(m.id)?' on':''}" onclick="togMsA('${m.id}',this)">${avEl(m.name,m.color,16)} ${m.name}</div>`).join('');
  const totalMins=lt.reduce((a,t)=>a+((t.estH||0)*60+(t.estM||0)),0);
  const timeDisp=totalMins?`${Math.floor(totalMins/60)}h${totalMins%60?' '+totalMins%60+'m':''}`:null;
  const taskList=lt.length?lt.map((t,i)=>`<div class="lrow"><div class="lord">${i+1}</div><span style="flex:1;font-size:12px">${t.name}</span>${taskTimeStr(t)?`<span style="font-size:10px;color:var(--t3)">${taskTimeStr(t)}</span>`:''} ${badgeEl(t.status,STB[t.status],STC[t.status])}</div>`).join(''):'<div style="font-size:12px;color:var(--t3)">No tasks linked</div>';
  openModal(`<div class="modal modal-lg"><h2>Edit Milestone</h2>
    <label class="fl">Name</label><input id="msn" type="text" value="${ms.name}">
    <label class="fl">Description</label><textarea id="msd">${ms.description||''}</textarea>
    <label class="fl">Assigned to</label><div class="ttag-row" id="msarow">${tb}</div>
    <label class="fl">Linked tasks (${lt.length})${timeDisp?' &middot; '+timeDisp+' total':''}</label>
    <div style="max-height:180px;overflow-y:auto;margin-top:6px">${taskList}</div>
    <div class="ma"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveMS('${id}')">Save</button></div>
  </div>`);
}

function togMsA(id,el){const i=_msAssigned.indexOf(id);if(i>=0){_msAssigned.splice(i,1);el.classList.remove('on');}else{_msAssigned.push(id);el.classList.add('on');}}

function saveMS(existId){
  const name=document.getElementById('msn').value.trim();if(!name)return;
  if(existId){const ms=S.milestones.find(m=>m.id===existId);if(ms){ms.name=name;ms.description=document.getElementById('msd').value.trim();ms.assignedTo=[..._msAssigned];}}
  else S.milestones.push({id:uid(),name,description:document.getElementById('msd').value.trim(),assignedTo:[..._msAssigned],color:COLORS[Math.floor(Math.random()*COLORS.length)],createdAt:Date.now()});
  save();closeModal();rMS();
}

function delMS(id){
  if(!confirm('Delete this milestone? Linked tasks will remain.'))return;
  const ms=S.milestones.find(m=>m.id===id);if(ms)ms.deleted=true;
  S.tasks.filter(t=>t.milestoneId===id).forEach(t=>t.milestoneId=null);
  save();rMS();
}

        </div>

          </div>
          ${lnk.roles.length?lnk.roles.map(r=>`<div class="rrow">
            <span class="rname">${r.name}</span>
